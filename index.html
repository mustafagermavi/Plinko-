<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Minimalist Crash</title>
    <style>
        :root {
            --bg: #ffffff;
            --main-stroke: #1a1a1a;
            --rocket-light: #ffffff;
            --rocket-mid: #f3f4f6;
            --rocket-dark: #e5e7eb;
            --accent: #1a1a1a;
        }

        body {
            margin: 0; background: #f9fafb;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 1. Isometric Minimalist Screen */
        #game-screen {
            width: 380px; height: 520px;
            background: var(--bg);
            /* Isometric Dot Grid */
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            position: relative; overflow: hidden;
            border-radius: 32px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        /* 2. The Isometric Minimalist Rocket */
        #rocket-container {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
            transform-style: preserve-3d;
            transition: bottom 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cube {
            width: 35px; height: 70px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Front Face */
        .face-f {
            position: absolute; width: 35px; height: 70px;
            background: var(--rocket-light); border: 2px solid var(--main-stroke);
            transform: translateZ(17.5px);
        }

        /* Side Face */
        .face-s {
            position: absolute; width: 35px; height: 70px;
            background: var(--rocket-mid); border: 2px solid var(--main-stroke);
            transform: rotateY(-90deg) translateZ(17.5px);
        }

        /* Top Point (Minimalist Pyramid Head) */
        .nose {
            position: absolute; top: -20px; width: 35px; height: 20px;
            background: var(--main-stroke);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }

        /* Minimal Thruster Effect */
        .thrust {
            position: absolute; bottom: -15px; left: 50%;
            transform: translateX(-50%); width: 8px; height: 15px;
            background: var(--main-stroke); opacity: 0;
            animation: pulse 0.1s infinite alternate;
        }

        @keyframes pulse { from { height: 10px; opacity: 0.2; } to { height: 20px; opacity: 0.5; } }

        /* 3. Ultra-Clean UI */
        #multiplier {
            position: absolute; top: 60px; width: 100%; text-align: center;
            font-size: 5.5rem; font-weight: 100; color: var(--main-stroke);
            letter-spacing: -4px;
        }

        .controls {
            width: 380px; padding: 40px 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn {
            width: 70%; padding: 22px; font-size: 0.9rem; font-weight: 700;
            color: #fff; background: var(--main-stroke); border: none;
            border-radius: 16px; cursor: pointer;
            letter-spacing: 3px; text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:active { transform: scale(0.96); }
        .btn.cashout { background: #fff; color: #000; border: 2px solid #000; }

        #status { margin-top: 20px; font-size: 0.7rem; font-weight: 600; color: #9ca3af; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00</div>
        <div id="rocket-container">
            <div class="cube" id="rocket">
                <div class="face-f"><div class="nose"></div></div>
                <div class="face-s"><div class="nose"></div></div>
                <div class="thrust" id="fire"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">Start Flight</button>
        <div id="status">SYSTEM IDLE</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const rocketCont = document.getElementById('rocket-container');
        const fire = document.getElementById('fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true; multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
            actionBtn.innerText = "Cash Out";
            actionBtn.classList.add('cashout');
            fire.style.opacity = '1';
            statusEl.innerText = "ACTIVE ASCENSION";
            multEl.style.color = "#000";

            gameLoop = setInterval(() => {
                multiplier += 0.025;
                multEl.innerText = multiplier.toFixed(2);
                let yPos = Math.min((multiplier - 1) * 65, 300);
                rocketCont.style.bottom = (80 + yPos) + 'px';

                if (multiplier >= crashPoint) endGame(true);
            }, 80);
        }

        function cashOut() {
            endGame(false);
            statusEl.innerText = "POSITION SECURED";
            rocketCont.style.transition = "all 1s cubic-bezier(0.4, 0, 1, 1)";
            rocketCont.style.bottom = "900px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            fire.style.opacity = '0';
            actionBtn.innerText = "Reset";
            actionBtn.classList.remove('cashout');
            if (isCrash) {
                statusEl.innerText = "TERMINATED";
                multEl.style.color = "#ef4444";
                rocketCont.style.bottom = "80px";
            }
        }
    </script>
</body>
</html>
