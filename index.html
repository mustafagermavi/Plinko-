<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Climber Mini-App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Dark Blue */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border: 2px solid #38bdf8;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="ui-overlay">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    // تنظیمات قەبارێ کانڤاس
    canvas.width = window.innerWidth > 400 ? 350 : window.innerWidth - 40;
    canvas.height = 500;

    let score = 0;
    let gameActive = true;

    // لۆجیکێ یاریزان (Pixel-style)
    const player = {
        x: canvas.width / 2 - 15,
        y: canvas.height - 50,
        width: 30,
        height: 30,
        color: '#38bdf8',
        dy: 0,
        jumpForce: -10,
        gravity: 0.5,
        grounded: true
    };

    // پاترم (Platforms)
    const platforms = [
        { x: 0, y: canvas.height - 20, width: canvas.width, height: 20 } // عەرد
    ];

    function createPlatform() {
        const lastPlatform = platforms[platforms.length - 1];
        const newY = lastPlatform.y - 100;
        const newWidth = Math.random() * (100 - 60) + 60;
        const newX = Math.random() * (canvas.width - newWidth);
        
        platforms.push({ x: newX, y: newY, width: newWidth, height: 15 });
    }

    // ئامادەکرنا دەستپێکێ
    for(let i=0; i<5; i++) createPlatform();

    function update() {
        if (!gameActive) return;

        // Gravity
        player.dy += player.gravity;
        player.y += player.dy;

        // Collision Detection (پێکدادان)
        player.grounded = false;
        platforms.forEach(plat => {
            if (player.x < plat.x + plat.width &&
                player.x + player.width > plat.x &&
                player.y + player.height > plat.y &&
                player.y + player.height < plat.y + plat.height + player.dy) {
                
                player.dy = 0;
                player.y = plat.y - player.height;
                player.grounded = true;
            }
        });

        // بزڤرینە خارێ دەما یاریزان بلند دبیت (Camera Follow)
        if (player.y < canvas.height / 2) {
            let diff = canvas.height / 2 - player.y;
            player.y = canvas.height / 2;
            platforms.forEach(plat => {
                plat.y += diff;
            });

            if (platforms[0].y > canvas.height) {
                platforms.shift();
                score++;
                scoreElement.innerText = score;
                createPlatform();
            }
        }

        // Game Over
        if (player.y > canvas.height) {
            gameActive = false;
            alert("یاری ب دووماهی هات! Score: " + score);
            location.reload();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // کیشانا یاریزانی
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;

        // کیشانا پاترمان
        ctx.fillStyle = '#94a3b8';
        platforms.forEach(plat => {
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // کۆنترۆل (ل سەر شاشێ یان کایبۆردێ)
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && player.grounded) {
            player.dy = player.jumpForce;
        }
    });

    canvas.addEventListener('touchstart', () => {
        if (player.grounded) {
            player.dy = player.jumpForce;
        }
    });

    loop();
</script>
</body>
</html>
