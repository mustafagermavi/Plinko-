<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Crash Pro - TON</title>
    <style>
        :root {
            --primary: #00ffa3;
            --bg-dark: #020617;
            --surface: #1e293b;
        }

        body {
            margin: 0; background-color: var(--bg-dark);
            color: white; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            image-rendering: pixelated;
        }

        /* شاشەیا یاریێ */
        #game-screen {
            width: 360px; height: 500px;
            background: linear-gradient(to bottom, #020617, #1e1b4b);
            border: 4px solid #334155; position: relative;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* ستارەیێن Parallax */
        .star { position: absolute; background: white; border-radius: 0; }
        .star-slow { width: 1px; height: 1px; opacity: 0.3; }
        .star-fast { width: 2px; height: 2px; opacity: 0.7; }

        /* موشەکا پیکسڵی یا پێشکەفتی */
        #rocket-container {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
        }

        #rocket {
            width: 34px; height: 50px; background: #f1f5f9;
            position: relative; border: 3px solid #000;
        }

        #rocket::before { /* سەرێ سۆر */
            content: ""; position: absolute; top: -12px; left: -3px;
            width: 34px; height: 12px; background: #ef4444; border: 3px solid #000;
        }

        /* ئاگرێ پیکسڵی */
        .flame {
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); width: 16px; height: 20px;
            background: #f59e0b; display: none;
            box-shadow: 0 5px 0 #ef4444, 0 10px 0 #7c2d12;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { height: 18px; opacity: 0.8; }
            100% { height: 22px; opacity: 1; }
        }

        /* مڵتیپلایەر */
        #multiplier {
            position: absolute; top: 50px; width: 100%;
            text-align: center; font-size: 3.5rem; font-weight: bold;
            color: var(--primary); text-shadow: 4px 4px 0px #000; z-index: 20;
        }

        /* پانێلا کەنترۆلێ */
        .controls {
            width: 360px; background: #111827; padding: 25px;
            border: 4px solid #334155; border-top: none; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 18px; font-size: 1.4rem;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            color: white; background: #059669; border: none;
            border-bottom: 8px solid #064e3b; cursor: pointer;
        }

        .btn:active { border-bottom: 2px solid #064e3b; transform: translateY(6px); }
        .btn.cashout { background: #d97706; border-bottom-color: #78350f; }

        #log { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="rocket-container">
            <div id="rocket">
                <div class="flame" id="flame"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">دەستپێبکە</button>
        <div id="log">ئامادەیە بۆ گەشتێ...</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const screen = document.getElementById('game-screen');
        const rocketCont = document.getElementById('rocket-container');
        const flame = document.getElementById('flame');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const logEl = document.getElementById('log');

        // دروستکرنا ستارەیێن Parallax
        function spawnStar(type) {
            const star = document.createElement('div');
            star.className = `star ${type}`;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = '-10px';
            screen.appendChild(star);

            let speed = type === 'star-fast' ? 5 : 2;
            let pos = -10;
            
            let move = setInterval(() => {
                if(!isRunning) { clearInterval(move); star.remove(); return; }
                pos += speed;
                star.style.top = pos + 'px';
                if (pos > 500) { clearInterval(move); star.remove(); }
            }, 30);
        }

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 4 + 1.1).toFixed(2);
            
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            flame.style.display = 'block';
            logEl.innerText = "موشەک بەرەف گەردوونێ دچیت!";

            // دروستکرنا ستارەیان ب بەردەوامی
            let starGen = setInterval(() => {
                if(!isRunning) clearInterval(starGen);
                spawnStar(Math.random() > 0.7 ? 'star-fast' : 'star-slow');
            }, 100);

            gameLoop = setInterval(() => {
                multiplier += 0.02;
                multEl.innerText = multiplier.toFixed(2) + "x";

                // لڤینا موشەکێ بەرەف سەر
                let moveY = Math.min((multiplier - 1) * 50, 250);
                rocketCont.style.bottom = (80 + moveY) + 'px';
                rocketCont.style.transform = `translateX(-50%) rotate(${(Math.random()-0.5)*3}deg)`;

                if (multiplier >= crashPoint) endGame(true);
            }, 80);
        }

        function cashOut() {
            endGame(false);
            logEl.innerText = `✅ پیرۆزە! تە ${multiplier.toFixed(2)}x قازانج کر.`;
            multEl.style.color = "#38bdf8";
            rocketCont.style.transition = "bottom 2s ease-in";
            rocketCont.style.bottom = "800px"; // دچیتە دەرڤە
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            flame.style.display = 'none';
            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.classList.remove('cashout');

            if (isCrash) {
                logEl.innerText = "💥 موشەک تەقیا! پارە دۆڕا.";
                multEl.style.color = "#f87171";
                document.getElementById('rocket').style.background = "orange";
                setTimeout(() => {
                    document.getElementById('rocket').style.background = "#f1f5f9";
                    rocketCont.style.bottom = "80px";
                }, 2000);
            }
        }
    </script>
</body>
</html>
