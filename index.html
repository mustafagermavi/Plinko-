<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Shalm Crash</title>
    <style>
        :root {
            --bg-space: #020617;
            --primary-neon: #fbbf24;
            --pot-color: #64748b;
            --pot-dark: #334155;
            --shalm-pink: #f472b6;
        }

        body {
            margin: 0; background-color: var(--bg-space);
            color: white; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            image-rendering: pixelated;
        }

        #game-screen {
            width: 360px; height: 500px;
            background: linear-gradient(to bottom, #020617, #1e1b4b);
            border: 4px solid #475569; position: relative;
            overflow: hidden;
        }

        .star { position: absolute; background: white; width: 2px; height: 2px; opacity: 0.4; }

        /* دیزاینێ مەنجەڵا شێلمێ */
        #pot-container {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
        }

        #pot {
            width: 50px; height: 40px; background: var(--pot-color);
            border: 4px solid #000; position: relative;
            box-shadow: inset -8px 0px 0px var(--pot-dark);
        }

        /* دەسکێن مەنجەڵێ */
        #pot::before, #pot::after {
            content: ""; position: absolute; top: 10px;
            width: 8px; height: 12px; background: var(--pot-dark); border: 3px solid #000;
        }
        #pot::before { left: -12px; }
        #pot::after { right: -12px; }

        /* هەڵما شێلمێ */
        .steam {
            position: absolute; top: -15px; left: 15px;
            width: 6px; height: 10px; background: rgba(255,255,255,0.4);
            animation: steamUp 0.5s infinite;
        }

        @keyframes steamUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
        }

        /* ئاگرێ بن مەنجەڵێ */
        .fire {
            position: absolute; bottom: -25px; left: 12px;
            width: 18px; height: 20px; background: #f97316;
            box-shadow: 0 5px 0 #ef4444; display: none;
            animation: boil 0.1s infinite;
        }

        @keyframes boil { 0% { height: 18px; } 50% { height: 25px; } 100% { height: 18px; } }

        /* پارتیکڵێن شێلمێ دەمێ تەقینێ */
        .shalm-piece {
            position: absolute; width: 10px; height: 10px;
            background: var(--shalm-pink); border: 2px solid #000;
        }

        #multiplier {
            position: absolute; top: 40px; width: 100%; text-align: center;
            font-size: 3.5rem; font-weight: bold; color: #fbbf24;
            text-shadow: 4px 4px 0px #000;
        }

        .controls {
            width: 360px; background: #1e293b; padding: 25px;
            border: 4px solid #475569; border-top: none; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 18px; font-size: 1.4rem; color: white;
            background: #e11d48; border: none; border-bottom: 8px solid #9f1239;
            font-weight: bold; cursor: pointer;
        }

        .btn.cashout { background: #16a34a; border-bottom-color: #14532d; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="pot-container">
            <div id="pot">
                <div class="steam" style="left: 10px;"></div>
                <div class="steam" style="left: 25px; animation-delay: 0.2s;"></div>
                <div class="fire" id="pot-fire"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">دەستپێبکە (شێلم)</button>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const potCont = document.getElementById('pot-container');
        const potFire = document.getElementById('pot-fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const screen = document.getElementById('game-screen');

        function spawnStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 350 + 'px';
            star.style.top = '-10px';
            screen.appendChild(star);
            let pos = -10;
            let move = setInterval(() => {
                pos += 4;
                star.style.top = pos + 'px';
                if (pos > 500) { clearInterval(move); star.remove(); }
            }, 30);
        }

        function explodeShalm(x, y) {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'shalm-piece';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = Math.random() > 0.5 ? '#f472b6' : '#fb923c'; // شێلم یان گێزر
                screen.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;

                let pMove = setInterval(() => {
                    p.style.left = (parseFloat(p.style.left) + vx) + 'px';
                    p.style.top = (parseFloat(p.style.top) + vy) + 'px';
                    vy += 0.3;
                    if (parseFloat(p.style.top) > 500) { clearInterval(pMove); p.remove(); }
                }, 25);
            }
        }

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 4 + 1.2).toFixed(2);
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            potFire.style.display = 'block';
            potCont.style.display = 'block';

            let starInterval = setInterval(() => { if(!isRunning) clearInterval(starInterval); spawnStar(); }, 100);

            gameLoop = setInterval(() => {
                multiplier += 0.05;
                multEl.innerText = multiplier.toFixed(2) + "x";
                let yPos = Math.min((multiplier - 1) * 60, 280);
                potCont.style.bottom = (50 + yPos) + 'px';
                potCont.style.transform = `translateX(-50%) rotate(${(Math.random()-0.5)*10}deg)`;

                if (multiplier >= crashPoint) endGame(true);
            }, 100);
        }

        function cashOut() {
            endGame(false);
            potCont.style.transition = "bottom 1s ease-in";
            potCont.style.bottom = "800px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            potFire.style.display = 'none';
            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.classList.remove('cashout');

            if (isCrash) {
                const rect = potCont.getBoundingClientRect();
                explodeShalm(rect.left - screen.getBoundingClientRect().left + 20, rect.top - screen.getBoundingClientRect().top + 20);
                potCont.style.display = 'none';
            }
        }
    </script>
</body>
</html>
