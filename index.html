<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto Wallet Dashboard</title>

<style>

body{
background:#0c0f14;
font-family:monospace;
color:white;
display:flex;
justify-content:center;
}

.app{
width:360px;
padding:10px;
}

.title{
text-align:center;
margin-bottom:10px;
font-size:18px;
}

.console{
background:black;
border-radius:6px;
height:220px;
overflow:auto;
padding:10px;
font-size:12px;
border:1px solid #333;
}

.found{
margin-top:8px;
}

.seed{
margin-top:10px;
background:#111;
border:1px solid #333;
border-radius:6px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
color:#666;
}

.coins{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-top:20px;
}

.coin{
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:20px;
}

.btc{background:#f7931a;}
.eth{background:#3c3c3d;}
.ltc{background:#345d9d;}
.bnb{background:#f3ba2f;}
.sol{background:#111;}
.usdt{background:#26a17b;}
.doge{background:#c2a633;}
.trx{background:#e50914;}

.check{
margin-top:5px;
color:#00ff9d;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#00ff9d;
border:none;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="app">

<div class="title">Crypto Wallet Checker</div>

<div class="console" id="console"></div>

<div class="found">Found: 0</div>

<div class="seed">Found Wallets Appear Here</div>

<div class="coins">

<div class="coin">
<div class="icon btc">₿</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon eth">Ξ</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon ltc">Ł</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon bnb">B</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon sol">S</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon usdt">T</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon btc">₿</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon doge">Ð</div>
<div class="check">✓</div>
</div>

<div class="coin">
<div class="icon trx">T</div>
<div class="check">✓</div>
</div>

</div>

<button onclick="start()">Start</button>

</div>

<script>

const words=[
"panther click lumber",
"energy target ten",
"glory witness put",
"trap trick erode",
"strong liberty laundry",
"knock craft stay",
"hill feel leave",
"enforce claim wonder",
"pass spoon during"
]

function start(){

let consoleBox=document.getElementById("console")

setInterval(()=>{

let line="Wallet Check: "+words[Math.floor(Math.random()*words.length)]

let div=document.createElement("div")

div.textContent=line

consoleBox.appendChild(div)

consoleBox.scrollTop=consoleBox.scrollHeight

},600)

}

</script>

</body>
</html>
