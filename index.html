<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto Dashboard</title>

<style>

body{
background:linear-gradient(180deg,#05070c,#0d1118);
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
color:white;
}

.app{
width:380px;
padding:15px;
}

.header{
font-size:20px;
text-align:center;
margin-bottom:15px;
letter-spacing:1px;
}

.console{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:12px;
height:230px;
padding:12px;
overflow:auto;
font-family:monospace;
font-size:12px;
}

.seedbox{
margin-top:10px;
height:70px;
border-radius:12px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

.coins{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
}

.coin{
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.btc{background:#f7931a;}
.eth{background:#627eea;}
.ltc{background:#345d9d;}
.bnb{background:#f3ba2f;color:black;}
.sol{background:#111;}
.usdt{background:#26a17b;}
.doge{background:#c2a633;}
.trx{background:#e50914;}

.check{
margin-top:6px;
color:#00ffa6;
font-size:18px;
}

button{
margin-top:25px;
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:linear-gradient(90deg,#00ffa6,#00d9ff);
font-weight:bold;
font-size:15px;
color:black;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Crypto Dashboard</div>

<div class="console">
Wallet Check: energy target ten<br>
Wallet Check: panther click lumber<br>
Wallet Check: glory witness put<br>
Wallet Check: trap trick erode
</div>

<div style="margin-top:8px">Found: 0</div>

<div class="seedbox">
Found Wallets Appear Here
</div>

<div class="coins">

<div class="coin"><div class="icon btc">₿</div><div class="check">✓</div></div>
<div class="coin"><div class="icon eth">Ξ</div><div class="check">✓</div></div>
<div class="coin"><div class="icon ltc">Ł</div><div class="check">✓</div></div>

<div class="coin"><div class="icon bnb">B</div><div class="check">✓</div></div>
<div class="coin"><div class="icon sol">S</div><div class="check">✓</div></div>
<div class="coin"><div class="icon usdt">T</div><div class="check">✓</div></div>

<div class="coin"><div class="icon btc">₿</div><div class="check">✓</div></div>
<div class="coin"><div class="icon doge">Ð</div><div class="check">✓</div></div>
<div class="coin"><div class="icon trx">T</div><div class="check">✓</div></div>

</div>

<button>Start</button>

</div>

</body>
</html>
