<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Pixel Crash</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff; /* سادە و سپی */
            --danger: #ff4d4d;
            --grid-color: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--accent);
        }

        /* 1. Minimalist Game Screen */
        #game-screen {
            width: 380px; height: 500px;
            background-color: var(--bg);
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px; /* خالێن بچووک وێنەیەکێ پرۆفیشناڵ ددەن */
            position: relative; overflow: hidden;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* 2. Minimalist Rocket (Pixel Shape) */
        #rocket-container {
            position: absolute; bottom: 60px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #rocket {
            width: 30px; height: 50px;
            background: var(--accent);
            position: relative;
            clip-path: polygon(50% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* ئاگرێ سادە (Minimal Flame) */
        .thrust {
            position: absolute; bottom: -15px; left: 50%;
            transform: translateX(-50%); width: 10px; height: 15px;
            background: var(--accent); opacity: 0.6;
            filter: blur(4px); display: none;
            animation: pulse 0.1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }

        /* 3. Modern UI */
        #multiplier {
            position: absolute; top: 80px; width: 100%; text-align: center;
            font-size: 5rem; font-weight: 200; /* دەکێ باریک و پرۆفیشناڵ */
            letter-spacing: -3px; z-index: 10;
        }

        .controls {
            width: 380px; padding: 30px 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn {
            width: 80%; padding: 20px; font-size: 1.1rem; font-weight: 600;
            color: #000; background: var(--accent); border: none;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn:active { transform: scale(0.95); opacity: 0.9; }
        .btn.cashout { background: transparent; color: var(--accent); border: 2px solid var(--accent); }

        #status { margin-top: 20px; font-size: 0.8rem; color: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00</div>
        <div id="rocket-container">
            <div id="rocket"></div>
            <div class="thrust" id="fire"></div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">Start</button>
        <div id="status">WAITING FOR INPUT</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const rocketCont = document.getElementById('rocket-container');
        const fire = document.getElementById('fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true; multiplier = 1.00;
            crashPoint = (Math.random() * 4 + 1.1).toFixed(2);
            actionBtn.innerText = "Cash Out";
            actionBtn.classList.add('cashout');
            fire.style.display = 'block';
            statusEl.innerText = "ASCENDING";
            multEl.style.color = "var(--accent)";

            gameLoop = setInterval(() => {
                multiplier += 0.02;
                multEl.innerText = multiplier.toFixed(2);
                let yPos = Math.min((multiplier - 1) * 70, 280);
                rocketCont.style.bottom = (60 + yPos) + 'px';

                if (multiplier >= crashPoint) endGame(true);
            }, 70);
        }

        function cashOut() {
            endGame(false);
            statusEl.innerText = "PROFIT SECURED";
            rocketCont.style.transition = "all 1s ease-in";
            rocketCont.style.bottom = "800px";
            rocketCont.style.opacity = "0";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            fire.style.display = 'none';
            actionBtn.innerText = "Try Again";
            actionBtn.classList.remove('cashout');
            if (isCrash) {
                statusEl.innerText = "CRASHED";
                multEl.style.color = var(--danger);
                rocketCont.style.bottom = "60px";
            }
        }
    </script>
</body>
</html>
