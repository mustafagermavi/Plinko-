<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON APEX X-PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --bg-dark: #020406;
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* شاشەی سەرەکی وەک داشبۆردی کەشتی ئاسمانی */
        .dashboard {
            width: 95%; max-width: 420px; margin-top: 10px;
            background: rgba(10, 15, 25, 0.8);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px; padding: 20px;
            backdrop-filter: blur(15px); position: relative;
        }

        /* نرخی گەورە و نەرم */
        .price-container { text-align: center; margin-bottom: 20px; }
        #price {
            font-size: 36px; font-weight: 700; color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        /* چارتێکی زۆر خێرا و پڕۆفیشناڵ */
        #chartContainer {
            width: 100%; height: 200px; position: relative;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.05) 0%, transparent 100%);
            border-radius: 10px; overflow: hidden;
        }
        canvas#mainChart { width: 100%; height: 100%; image-rendering: auto; }

        /* دوگمە دیزاین کراوەکان (نەک ئیمۆجی) */
        .trade-actions {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;
            width: 95%; max-width: 420px;
        }

        .btn-pro {
            height: 65px; border: none; border-radius: 12px;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-up { 
            background: linear-gradient(135deg, #064e3b 0%, #0ecb81 100%);
            box-shadow: 0 0 15px rgba(14, 203, 129, 0.3);
            border-bottom: 4px solid #053326;
        }
        .btn-down { 
            background: linear-gradient(135deg, #7f1d1d 0%, #f6465d 100%);
            box-shadow: 0 0 15px rgba(246, 70, 93, 0.3);
            border-bottom: 4px solid #4a1111;
        }

        .btn-pro:active { transform: translateY(4px); box-shadow: none; }

        /* ئایکۆنی پڕۆفیشناڵ دروستکراو بە CSS */
        .icon-bull { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid white; }
        .icon-bear { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid white; }

        /* شریتی زانیاری ژێرەوە */
        .info-bar {
            width: 100%; display: flex; justify-content: space-between;
            padding: 10px 20px; font-size: 10px; color: #555;
            border-top: 1px solid #111; margin-top: auto;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="price-container">
        <div style="font-size: 10px; color: #444; margin-bottom: 5px;">TON NETWORK / REALTIME FEED</div>
        <div id="price">0.0000</div>
    </div>

    <div id="chartContainer">
        <canvas id="mainChart"></canvas>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 15px;">
        <span style="font-size: 12px; color: #888;">BALANCE:</span>
        <span id="balance" style="color: var(--neon-blue); font-weight: bold;">1000.00 PTS</span>
    </div>
</div>

<div class="trade-actions">
    <button class="btn-pro btn-up" onclick="handleTrade('up')">
        <div class="icon-bull"></div> BUY
    </button>
    <button class="btn-pro btn-down" onclick="handleTrade('down')">
        SELL <div class="icon-bear"></div>
    </button>
</div>

<div class="info-bar">
    <span>LATENCY: 14MS</span>
    <span>ENGINE: APEX-X1</span>
    <span>STATUS: SECURE</span>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let balance = 1000.00;
    let prices = Array(100).fill(0);
    let currentPrice = 0;
    let isLive = false;

    const canvas = document.getElementById('mainChart');
    const ctx = canvas.getContext('2d');

    // سیستەمی نوێکردنەوەی نرخ (بە خێرایی و بە بێ دابڕان)
    async function updateData() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TONUSDT');
            const data = await res.json();
            let p = parseFloat(data.price);
            
            if(currentPrice === 0) prices.fill(p);
            currentPrice = p;
            prices.push(p);
            prices.shift();
            
            document.getElementById('price').innerText = currentPrice.toFixed(4);
        } catch(e) {}
    }

    // ئەنیمەیشنی چارت (٦٠ فریم لە چرکەیەکدا بۆ ئەوەی خاو نەبێت)
    function animate() {
        canvas.width = canvas.offsetWidth * 2;
        canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let min = Math.min(...prices);
        let max = Math.max(...prices);
        let range = max - min || 0.1;

        // کێشانی سێبەری ژێر گرافەکە (Glow Area)
        let gradient = ctx.createLinearGradient(0, 0, 0, 180);
        gradient.addColorStop(0, 'rgba(0, 243, 255, 0.2)');
        gradient.addColorStop(1, 'transparent');
        
        ctx.beginPath();
        ctx.fillStyle = gradient;
        prices.forEach((p, i) => {
            let x = (i / 99) * canvas.offsetWidth;
            let y = 180 - ((p - min) / range) * 150;
            if(i === 0) ctx.moveTo(x, 180);
            ctx.lineTo(x, y);
            if(i === 99) ctx.lineTo(x, 180);
        });
        ctx.fill();

        // کێشانی هێڵی سەرەکی
        ctx.beginPath();
        ctx.strokeStyle = varColor();
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        prices.forEach((p, i) => {
            let x = (i / 99) * canvas.offsetWidth;
            let y = 180 - ((p - min) / range) * 150;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        requestAnimationFrame(animate);
    }

    function varColor() {
        return isLive ? (currentPrice > entryPrice ? "#39ff14" : "#ff0055") : "#00f3ff";
    }

    let entryPrice = 0;
    function handleTrade(dir) {
        if(isLive) return;
        isLive = true;
        entryPrice = currentPrice;
        tg.HapticFeedback.impactOccurred('heavy');
        
        setTimeout(() => {
            let win = (dir === 'up' && currentPrice > entryPrice) || (dir === 'down' && currentPrice < entryPrice);
            if(win) {
                balance += 50; 
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                balance -= 50;
                tg.HapticFeedback.notificationOccurred('error');
            }
            document.getElementById('balance').innerText = balance.toFixed(2) + " PTS";
            isLive = false;
        }, 3000);
    }

    setInterval(updateData, 1000);
    animate();
</script>

</body>
</html>
