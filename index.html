<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Live Predictor</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --green: #0ecb81;
            --red: #f6465d;
            --yellow: #f0b90b;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .price-display {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
            font-family: monospace;
            color: var(--yellow);
            transition: 0.2s;
        }
        /* ستایلی Bento Grid بۆ گرافەکە */
        .chart-box {
            background: var(--card);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid #2b3139;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 150px;
            display: block;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }
        .up { background: var(--green); box-shadow: 0 4px 15px rgba(14, 203, 129, 0.3); }
        .down { background: var(--red); box-shadow: 0 4px 15px rgba(246, 70, 93, 0.3); }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-bar {
            margin-top: 15px;
            font-size: 14px;
            color: #848e9c;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="price-display" id="price">5.4200</div>
    
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="controls">
        <button class="up" id="upBtn" onclick="bet('up')">UP ▲</button>
        <button class="down" id="downBtn" onclick="bet('down')">DOWN ▼</button>
    </div>

    <div id="status" class="status-bar">چاوەڕێی پێشبینی تۆین...</div>
</div>

<script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    const priceEl = document.getElementById('price');
    const statusEl = document.getElementById('status');
    
    let prices = Array(50).fill(5.4200);
    let currentPrice = 5.4200;
    let isPlaying = false;
    let entryPrice = 0;

    // ڕێکخستنی قەبارەی کانڤاس
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    function updatePrice() {
        const change = (Math.random() - 0.5) * 0.005;
        currentPrice = parseFloat((currentPrice + change).toFixed(4));
        prices.push(currentPrice);
        prices.shift();
        
        priceEl.innerText = currentPrice.toFixed(4);
        drawChart();

        if (isPlaying) {
            priceEl.style.color = currentPrice >= entryPrice ? "#0ecb81" : "#f6465d";
        } else {
            priceEl.style.color = "#f0b90b";
        }
    }

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = isPlaying ? (currentPrice >= entryPrice ? "#0ecb81" : "#f6465d") : "#f0b90b";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";

        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const range = max - min;

        prices.forEach((p, i) => {
            const x = (i / (prices.length - 1)) * canvas.width;
            const y = canvas.height - ((p - min) / range) * canvas.height;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });

        ctx.stroke();
        
        // دروستکردنی سێبەر (Gradient) لە ژێر هێڵەکە
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, ctx.strokeStyle + "33");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.fill();
    }

    function bet(type) {
        if (isPlaying) return;
        isPlaying = true;
        entryPrice = currentPrice;
        document.getElementById('upBtn').disabled = true;
        document.getElementById('downBtn').disabled = true;
        
        let seconds = 5;
        statusEl.innerText = `نرخی چوونە ژوورەوە: ${entryPrice} | کات: ${seconds}s`;

        const timer = setInterval(() => {
            seconds--;
            statusEl.innerText = `نرخی چوونە ژوورەوە: ${entryPrice} | کات: ${seconds}s`;
            if (seconds <= 0) {
                clearInterval(timer);
                finishBet(type);
            }
        }, 1000);
    }

    function finishBet(type) {
        const win = (type === 'up' && currentPrice > entryPrice) || (type === 'down' && currentPrice < entryPrice);
        statusEl.innerText = win ? "🎉 پیرۆزە! بردتەوە" : "❌ بەداخەوە! دۆڕاندت";
        statusEl.style.color = win ? "#0ecb81" : "#f6465d";

        setTimeout(() => {
            isPlaying = false;
            statusEl.innerText = "چاوەڕێی پێشبینی تۆین...";
            statusEl.style.color = "#848e9c";
            document.getElementById('upBtn').disabled = false;
            document.getElementById('downBtn').disabled = false;
        }, 3000);
    }

    setInterval(updatePrice, 100); // نوێکردنەوەی خێرا بۆ هەستی Live
</script>

</body>
</html>
