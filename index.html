<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard UI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --text-gray: #94a3b8;
            --terminal-green: #10b981;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-gray);
        }

        /* Terminal Box */
        .terminal {
            background: #000;
            border-radius: 10px;
            padding: 15px;
            height: 200px;
            overflow-y: hidden;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: var(--terminal-green);
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .terminal-line { margin-bottom: 4px; }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Crypto Grid */
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .crypto-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .crypto-item:hover { background: rgba(255, 255, 255, 0.1); }

        .crypto-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            border-radius: 50%;
        }

        .checkbox {
            width: 15px;
            height: 15px;
            accent-color: var(--accent-blue);
        }

        .btn-start {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>Checked: <span id="checked-count">0</span></span>
        <span>Found: <span style="color: #ef4444;">0</span></span>
    </div>

    <div class="terminal" id="terminal-screen">
        </div>

    <div class="crypto-grid">
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
        <div class="crypto-item">
            <img src="https://cryptologos.cc/logos/dogecoin-doge-logo.png" class="crypto-icon">
            <input type="checkbox" class="checkbox" checked>
        </div>
    </div>

    <button class="btn-start" onclick="startProcess()">START SCAN</button>
</div>

<script>
    const words = ["alpha", "bravo", "crystal", "delta", "echo", "frost", "gold", "hotel", "india", "joker", "king", "lemon"];
    let count = 0;

    function startProcess() {
        const terminal = document.getElementById('terminal-screen');
        const countDisplay = document.getElementById('checked-count');

        setInterval(() => {
            count++;
            countDisplay.innerText = count;

            const randomPhrase = Array.from({length: 4}, () => words[Math.floor(Math.random() * words.length)]).join(' ');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            line.innerText = `Checking: ${randomPhrase}...`;
            
            terminal.appendChild(line);
            if (terminal.childNodes.length > 10) {
                terminal.removeChild(terminal.firstChild);
            }
            terminal.scrollTop = terminal.scrollHeight;
        }, 100);
    }
</script>

</body>
</html>
