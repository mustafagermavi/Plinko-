<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Predictor - Pro Trader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #080a0c;
            --card: #12161a;
            --green: #0ecb81;
            --red: #f6465d;
            --yellow: #f0b90b;
            --accent: #00d2ff;
        }
        body {
            margin: 0; padding: 15px;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; margin-bottom: 10px; }
        
        .price-text { font-size: 42px; font-weight: 800; color: var(--yellow); font-family: monospace; }
        canvas { width: 100%; height: 130px; }

        .bet-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input {
            grid-column: span 2; background: #1c2127; border: 1px solid #2b3139;
            border-radius: 12px; padding: 15px; color: white; font-size: 20px; text-align: center; margin-bottom: 5px;
        }

        .btn { padding: 18px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .up { background: var(--green); box-shadow: 0 4px 15px rgba(14, 203, 129, 0.2); }
        .down { background: var(--red); box-shadow: 0 4px 15px rgba(246, 70, 93, 0.2); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.3; }

        /* ستایلی بەشی مێژوو */
        .history-box { margin-top: 15px; text-align: right; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 10px 15px;
            border-radius: 12px; margin-bottom: 8px; font-size: 13px;
            border-right: 4px solid #ccc;
        }
        .win { border-right-color: var(--green); color: var(--green); }
        .loss { border-right-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; padding: 0 5px;">
        <span style="color: #848e9c;">باڵانسی تۆ:</span>
        <span style="color: var(--accent); font-weight: bold;"><span id="balance">1000</span> Pts</span>
    </div>

    <div class="card">
        <div id="price" class="price-text">5.4200</div>
        <canvas id="chart"></canvas>
    </div>

    <div class="bet-controls">
        <input type="number" id="betAmount" value="100" step="10">
        <button class="btn up" id="upBtn" onclick="placeBet('up')">UP ▲</button>
        <button class="btn down" id="downBtn" onclick="placeBet('down')">DOWN ▼</button>
    </div>

    <div class="history-box">
        <div style="font-size: 14px; color: #848e9c; margin-bottom: 10px;">📜 مێژووی گرەوەکان</div>
        <div id="historyList">
            </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = 1000;
    let currentPrice = 5.4200;
    let prices = Array(40).fill(5.4200);
    let isPlaying = false;
    let entryPrice = 0;

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    function updatePrice() {
        let change = (Math.random() - 0.5) * 0.008;
        currentPrice = parseFloat((currentPrice + change).toFixed(4));
        prices.push(currentPrice);
        prices.shift();
        document.getElementById('price').innerText = currentPrice.toFixed(4);
        drawChart();
    }

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = isPlaying ? (currentPrice >= entryPrice ? "#0ecb81" : "#f6465d") : "#00d2ff";
        ctx.lineWidth = 3;
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * canvas.width;
            let y = canvas.height - ((p - min) / (max - min)) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function addHistory(type, amount, win, entry, exit) {
        const list = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = `history-item ${win ? 'win' : 'loss'}`;
        
        const resultText = win ? `+${Math.floor(amount * 1.9)}` : `-${amount}`;
        const typeIcon = type === 'up' ? '▲' : '▼';
        
        item.innerHTML = `
            <div><b>${typeIcon} ${amount} Pts</b> <br> <small>Entry: ${entry}</small></div>
            <div style="text-align: left;"><b>${resultText}</b> <br> <small>Exit: ${exit}</small></div>
        `;
        
        list.prepend(item);
        if(list.children.length > 5) list.lastChild.remove(); // تەنها ٥ مێژووی کۆتایی نیشان بدە
    }

    function placeBet(type) {
        let amount = parseInt(document.getElementById('betAmount').value);
        if (amount > balance || amount <= 0) {
            tg.showAlert("باڵانست بەش ناکات یان بڕەکە هەڵەیە!");
            return;
        }

        isPlaying = true;
        balance -= amount;
        document.getElementById('balance').innerText = balance;
        entryPrice = currentPrice;
        
        document.querySelectorAll('.btn').forEach(b => b.disabled = true);
        tg.HapticFeedback.impactOccurred('medium');

        setTimeout(() => {
            let exitPrice = currentPrice;
            let win = (type === 'up' && exitPrice > entryPrice) || (type === 'down' && exitPrice < entryPrice);
            
            if (win) {
                let profit = Math.floor(amount * 1.9);
                balance += profit;
                document.getElementById('balance').innerText = balance;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }

            addHistory(type, amount, win, entryPrice.toFixed(4), exitPrice.toFixed(4));

            isPlaying = false;
            document.querySelectorAll('.btn').forEach(b => b.disabled = false);
        }, 5000); 
    }

    setInterval(updatePrice, 150);
</script>

</body>
</html>
