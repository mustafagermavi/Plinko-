<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Climber - Tap to Jump</title>
    <style>
        :root { --primary: #00f2ff; --bg: #050a14; }
        body { margin: 0; background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 90vh; background: radial-gradient(circle at top, #1a2a44 0%, #050a14 100%); border-radius: 24px; overflow: hidden; border: 1px solid rgba(0,242,255,0.2); }
        canvas { display: block; }
        .hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .score-val { font-size: 24px; font-weight: 800; color: var(--primary); }
        #start-screen { position: absolute; inset: 0; background: rgba(5, 10, 20, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .btn-play { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div class="score-box">
                <span id="score" class="score-val">0</span>
            </div>
        </div>

        <div id="start-screen">
            <h1 style="color: var(--primary);">NEON JUMP</h1>
            <p style="color: #666; margin-bottom: 30px;">Tap anywhere to Jump!</p>
            <button class="btn-play" onclick="startGame()">START GAME</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score');
    const startScreen = document.getElementById('start-screen');

    let gameActive = false;
    let score = 0;
    let cameraY = 0;

    function resize() {
        canvas.width = document.getElementById('game-container').clientWidth;
        canvas.height = document.getElementById('game-container').clientHeight;
    }
    resize();

    const player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        r: 12,
        dy: 0,
        jump: -10, // هێزا بازدانێ
        grav: 0.4, // کێشانا عەردی (Gravity)
        color: '#00f2ff'
    };

    let platforms = [];
    function initPlatforms() {
        platforms = [];
        platforms.push({x: 0, y: canvas.height - 20, w: canvas.width, h: 20}); // عەرد
        for(let i=0; i<6; i++) {
            addPlatform(canvas.height - (i * 150) - 200);
        }
    }

    function addPlatform(y) {
        const w = 80 + Math.random() * 40;
        platforms.push({ x: Math.random() * (canvas.width - w), y: y, w: w, h: 12 });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(0, cameraY);

        platforms.forEach(p => {
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 6);
            ctx.fill();
        });

        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    function update() {
        if(!gameActive) return;

        player.dy += player.grav;
        player.y += player.dy;

        // Collision (مانەوە ل سەر پاترمێ)
        if(player.dy > 0) {
            platforms.forEach(p => {
                if(player.x > p.x && player.x < p.x + p.w && 
                   player.y + player.r > p.y && player.y + player.r < p.y + p.h + player.dy) {
                    player.dy = 0;
                    player.y = p.y - player.r;
                }
            });
        }

        // Camera move
        if(player.y < canvas.height/2 + cameraY) {
            cameraY = canvas.height/2 - player.y;
            score++;
            scoreVal.innerText = Math.floor(score/10);
        }

        // Game Over
        if(player.y > cameraY + canvas.height + 100) {
            gameActive = false;
            startScreen.style.display = 'flex';
        }

        // Infinite Platforms
        if(platforms[0].y > cameraY + canvas.height + 100) {
            platforms.shift();
            addPlatform(platforms[platforms.length-1].y - 150);
        }
    }

    function loop() {
        update(); draw();
        requestAnimationFrame(loop);
    }

    function handleInput(e) {
        if(!gameActive) return;
        player.dy = player.jump; // بازدان ب هەر کلیکەکێ
        
        // لڤینا چەپ و ڕاست ب کلیک یان تاتش
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let rect = canvas.getBoundingClientRect();
        player.x = clientX - rect.left;
    }

    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });
    window.addEventListener('mousedown', (e) => { handleInput(e); });

    function startGame() {
        score = 0; cameraY = 0; scoreVal.innerText = "0";
        player.x = canvas.width / 2; player.y = canvas.height - 100; player.dy = 0;
        initPlatforms();
        gameActive = true;
        startScreen.style.display = 'none';
    }

    initPlatforms();
    loop();
</script>
</body>
</html>
