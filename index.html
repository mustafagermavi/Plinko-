<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Legend - Cyber Sheep</title>
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --gold: #fbbf24;
            /* Lamb Colors (Advanced Palette) */
            --wool-pure: #ffffff;
            --wool-mid: #e2e8f0;
            --wool-dark: #94a3b8;
            --face-skin: #fecaca;
        }

        body {
            margin: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            image-rendering: pixelated;
        }

        /* 1. پاشبنەمایێ فەزایێ (High-End Space) */
        #game-screen {
            width: 380px; height: 520px;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            border: 3px solid #334155; position: relative;
            overflow: hidden; border-radius: 12px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        .star { position: absolute; background: white; border-radius: 50%; }

        /* 2. دیزاینا بەرخێ ئەفسانەیی (Legendary Pixel Art) */
        #lamb-container {
            position: absolute; bottom: 60px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
        }

        #lamb {
            width: 54px; height: 48px; position: relative;
            background: var(--wool-pure);
            border: 4px solid #000;
            /* Shading Advanced */
            box-shadow: 
                inset -12px -10px 0px var(--wool-mid),
                inset -20px -18px 0px var(--wool-dark);
        }

        /* سەرێ بەرخی */
        #lamb::before {
            content: ""; position: absolute; top: 8px; left: -12px;
            width: 24px; height: 22px; background: var(--face-skin);
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px #fca5a5;
        }

        /* چاڤێن پرۆفیشناڵ (Dizzy but High-end) */
        .eye {
            position: absolute; top: 16px; left: -4px;
            width: 6px; height: 6px; background: #000;
            box-shadow: 10px 0 0 #000; /* چاوی دووەم */
        }

        /* جێت-پاتێ لوکس (Cyber Jetpack) */
        .jetpack {
            position: absolute; top: 4px; right: -14px;
            width: 18px; height: 32px; background: #475569;
            border: 4px solid #000;
            box-shadow: inset -6px 0px 0px #1e293b, 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .flame {
            position: absolute; bottom: -28px; right: -10px;
            width: 12px; height: 25px; background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 5px 0 #0ea5e9;
            display: none; animation: engine-shake 0.1s infinite;
        }

        @keyframes engine-shake {
            0% { height: 22px; opacity: 0.8; }
            100% { height: 32px; opacity: 1; }
        }

        /* 3. مڵتیپلایەر و UI */
        #multiplier {
            position: absolute; top: 50px; width: 100%; text-align: center;
            font-size: 4.2rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6); z-index: 10;
        }

        .controls {
            width: 380px; background: #0f172a; padding: 25px;
            border: 3px solid #334155; border-top: none;
            box-sizing: border-box; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
        }

        .btn {
            width: 100%; padding: 20px; font-size: 1.4rem; font-weight: bold;
            color: #020617; background: var(--accent); border: none;
            border-radius: 8px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 #0369a1; transition: 0.1s;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0369a1; }
        .btn.cashout { background: var(--gold); box-shadow: 0 6px 0 #b45309; }

        #status { margin-top: 15px; text-align: center; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="lamb-container">
            <div id="lamb">
                <div class="eye"></div>
                <div class="jetpack">
                    <div class="flame" id="fire"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">START BET</button>
        <div id="status">READY FOR TAKE OFF</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const lambCont = document.getElementById('lamb-container');
        const fire = document.getElementById('fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');
        const screen = document.getElementById('game-screen');

        function spawnStar() {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.left = Math.random() * 370 + 'px';
            star.style.top = '-10px';
            screen.appendChild(star);
            let pos = -10;
            let move = setInterval(() => {
                pos += 3; star.style.top = pos + 'px';
                if (pos > 520) { clearInterval(move); star.remove(); }
            }, 30);
        }

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true; multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            fire.style.display = 'block';
            statusEl.innerText = "THE SHEEP IS FLYING!";
            
            let stars = setInterval(() => { if(!isRunning) clearInterval(stars); spawnStar(); }, 100);

            gameLoop = setInterval(() => {
                multiplier += 0.03;
                multEl.innerText = multiplier.toFixed(2) + "x";
                let yPos = Math.min((multiplier - 1) * 65, 300);
                lambCont.style.bottom = (60 + yPos) + 'px';
                lambCont.style.transform = `translateX(-50%) rotate(${(Math.random()-0.5)*8}deg)`;

                if (multiplier >= crashPoint) endGame(true);
            }, 80);
        }

        function cashOut() {
            endGame(false);
            statusEl.innerText = "WINNER! COLLECTED " + multiplier.toFixed(2) + "x";
            lambCont.style.transition = "bottom 1s ease-in";
            lambCont.style.bottom = "800px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            fire.style.display = 'none';
            actionBtn.innerText = "RETRY";
            actionBtn.classList.remove('cashout');
            if (isCrash) {
                statusEl.innerText = "CRASHED! BETTER LUCK NEXT TIME";
                multEl.style.color = "#ef4444";
                lambCont.style.transform = "translateX(-50%) scale(0.5) rotate(180deg)";
            }
        }
    </script>
</body>
</html>
