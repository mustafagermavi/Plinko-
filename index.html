<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto Balance Checker</title>

<style>

body{
background:#0d1117;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
background:#00ffa6;
font-weight:bold;
border-radius:8px;
}

.result{
margin-top:20px;
background:#161b22;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Crypto Balance Checker</h2>

<input id="address" placeholder="Enter BTC Wallet Address">

<button onclick="checkBalance()">Check Balance</button>

<div class="result" id="result">
Balance will appear here
</div>

</div>

<script>

async function checkBalance(){

let address = document.getElementById("address").value

let url = "https://api.blockcypher.com/v1/btc/main/addrs/"+address+"/balance"

let response = await fetch(url)

let data = await response.json()

let btc = data.balance / 100000000

document.getElementById("result").innerHTML =
"Balance: " + btc + " BTC"

}

</script>

</body>
</html>
