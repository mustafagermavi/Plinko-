<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Miner - TON Edition</title>
    <style>
        :root {
            --pixel-size: 4px;
            --main-bg: #0f172a;
            --ton-blue: #0088cc;
            --pixel-green: #22c55e;
        }

        body {
            background-color: var(--main-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            image-rendering: pixelated;
        }

        /* 1. کێلگەیا یاریێ ب شێوازێ Isometric */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 50px);
            grid-template-rows: repeat(5, 50px);
            gap: 5px;
            transform: rotateX(45deg) rotateZ(-45deg); /* شێوازێ ایزۆمێتریک */
            margin-bottom: 50px;
        }

        .tile {
            width: 50px;
            height: 50px;
            background-color: #1e293b;
            border: 2px solid #334155;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px #000;
        }

        .tile:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
            background-color: var(--pixel-green);
        }

        /* 2. کارەکتەرێ مینیمالست */
        .player {
            width: 20px;
            height: 30px;
            background-color: #f43f5e;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid black;
        }

        /* 3. پانێلا زانیاریان (Modern UI) */
        .info-panel {
            width: 80%;
            max-width: 350px;
            background: rgba(30, 41, 59, 0.8);
            border: 4px solid #334155;
            padding: 15px;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.5);
        }

        .score-box {
            font-size: 1.5rem;
            color: #fbbf24;
            margin-bottom: 10px;
        }

        .btn-ton {
            background: var(--ton-blue);
            border: 4px solid #005f8d;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <div class="score-box">💰 <span id="balance">0.00</span> TON</div>
        <div style="font-size: 10px; color: #94a3b8; margin-bottom: 10px;">کلیک بکە ل سەر پارچێن ئەردی دا پیکسڵان کۆم بکەی</div>
    </div>

    <div style="height: 100px;"></div>

    <div class="game-grid" id="grid">
        </div>

    <script>
        const grid = document.getElementById('grid');
        const balanceEl = document.getElementById('balance');
        let balance = 0;

        // دروستکرنا ٢٥ پارچێن ئەردی
        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.onclick = () => {
                // لۆجیکێ قازانجێ هەرەمەکی
                let gain = Math.random() > 0.8 ? 0.01 : 0.001;
                balance += gain;
                balanceEl.innerText = balance.toFixed(3);
                
                // ئەنیمەشینا پیکسڵی
                tile.style.backgroundColor = '#4ade80';
                setTimeout(() => tile.style.backgroundColor = '#1e293b', 100);
            };
            grid.appendChild(tile);
        }
    </script>
</body>
</html>
