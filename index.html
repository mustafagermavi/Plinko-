<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⎾ WALLET SCANNER ⏌ | DARK TERMINAL</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f16;
      font-family: 'Courier New', 'Space Mono', 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px 12px;
    }

    /* MAIN DASHBOARD CARD — hacker mobile core */
    .dashboard {
      max-width: 380px;
      width: 100%;
      margin: 0 auto;
      background: #0d111c;
      border-radius: 36px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 140, 0.2);
      overflow: hidden;
      transition: all 0.2s;
    }

    .content {
      padding: 20px 18px 28px 18px;
    }

    /* === HEADER (cyber glow) === */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .glitch-title {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #b5ffd0, #2eff9e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(46, 255, 158, 0.3);
      font-family: 'Courier New', monospace;
    }
    .sub-badge {
      font-size: 0.6rem;
      background: #10141f;
      color: #2eff9e;
      border-radius: 30px;
      padding: 4px 12px;
      display: inline-block;
      margin-top: 6px;
      border: 0.5px solid #2eff9e70;
      letter-spacing: 1px;
    }

    /* === TERMINAL CONSOLE (height 240px) === */
    .terminal {
      background: #03050a;
      border-radius: 20px;
      border: 1px solid #1e2a3a;
      margin-bottom: 22px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }
    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 6px 14px;
      border-bottom: 1px solid #1f2a3c;
    }
    .led {
      width: 10px;
      height: 10px;
      background: #2eff9e;
      border-radius: 50%;
      box-shadow: 0 0 6px #2eff9e;
      animation: pulse 1.2s infinite;
    }
    .terminal-header span {
      color: #8f9bb5;
      font-size: 0.7rem;
      letter-spacing: 1px;
    }
    .console-window {
      height: 240px;
      overflow-y: auto;
      padding: 12px 14px;
      font-size: 0.7rem;
      line-height: 1.5;
      color: #caf5df;
      font-family: 'Courier New', monospace;
      scroll-behavior: smooth;
    }
    .console-line {
      border-left: 2px solid #2eff9e80;
      padding-left: 8px;
      margin-bottom: 9px;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 0.68rem;
      animation: fadeSlideIn 0.2s ease-out;
    }
    @keyframes fadeSlideIn {
      0% { opacity: 0; transform: translateX(-4px);}
      100% { opacity: 1; transform: translateX(0);}
    }
    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.9);}
      100% { opacity: 1; transform: scale(1);}
    }
    .console-window::-webkit-scrollbar {
      width: 3px;
    }
    .console-window::-webkit-scrollbar-track {
      background: #0c1020;
    }
    .console-window::-webkit-scrollbar-thumb {
      background: #2eff9e;
      border-radius: 10px;
    }

    /* === FOUND COUNTER === */
    .counter-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .found-badge {
      background: #020408c9;
      border-radius: 60px;
      padding: 5px 18px;
      border: 1px solid #2eff9e50;
      backdrop-filter: blur(2px);
    }
    .found-badge .label {
      font-size: 0.7rem;
      color: #a0b2cf;
      font-weight: 500;
    }
    .found-badge .number {
      font-size: 1.8rem;
      font-weight: 800;
      color: #2eff9e;
      text-shadow: 0 0 3px #0aff70;
      margin-left: 10px;
      line-height: 1;
    }
    .shield-icon {
      font-size: 0.7rem;
      color: #2eff9e;
    }

    /* === RESULT BOX (Found Wallets Appear Here) === */
    .result-panel {
      background: #080c16;
      border-radius: 20px;
      border: 1px solid #232e42;
      padding: 12px 12px;
      margin-bottom: 24px;
      max-height: 150px;
      overflow-y: auto;
    }
    .result-panel h4 {
      font-size: 0.7rem;
      color: #bbd4ff;
      letter-spacing: 0.5px;
      border-left: 3px solid #2eff9e;
      padding-left: 10px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .wallets-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wallet-entry {
      background: #0c1122;
      border-radius: 16px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 2px solid #2eff9e;
      font-size: 0.65rem;
      transition: 0.1s;
      animation: fadeSlideIn 0.2s ease;
    }
    .coin-tag {
      background: #1f2a44;
      border-radius: 30px;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 0.6rem;
      color: #e2ffec;
    }
    .wallet-addr {
      font-family: monospace;
      word-break: break-all;
      color: #c0e0d0;
    }
    .empty-placeholder {
      color: #54657e;
      text-align: center;
      font-size: 0.7rem;
      padding: 16px 0;
      font-style: italic;
    }

    /* === 3x3 COIN GRID (circular + green check) === */
    .coin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 12px;
      margin-bottom: 28px;
      margin-top: 8px;
    }
    .coin-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .coin-circle {
      width: 68px;
      height: 68px;
      background: #1e2438;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5), 0 0 0 1px rgba(46, 255, 158, 0.25);
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s;
      font-size: 2rem;
      color: white;
      margin-bottom: 8px;
    }
    .coin-circle i, .coin-circle span {
      filter: drop-shadow(0 1px 2px black);
    }
    .coin-circle:active {
      transform: scale(0.94);
    }
    .check-icon {
      color: #2eff9e;
      font-size: 1rem;
      background: rgba(0,0,0,0.5);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      backdrop-filter: blur(2px);
      margin-top: 2px;
    }
    .check-icon i {
      font-size: 0.9rem;
      filter: drop-shadow(0 0 2px #0aff70);
    }

    /* === LARGE START SCAN BUTTON (neon gradient) === */
    .scan-btn-container {
      margin-top: 6px;
    }
    .start-scan {
      width: 100%;
      background: linear-gradient(95deg, #0fdd88, #00aa55);
      border: none;
      font-family: 'Courier New', 'Space Mono', monospace;
      font-weight: 800;
      font-size: 1.2rem;
      padding: 14px 10px;
      border-radius: 80px;
      letter-spacing: 1.8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px #00ff8c, 0 2px 5px rgba(0,0,0,0.5);
      color: #03100a;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .start-scan i {
      font-size: 1.2rem;
      color: #021007;
    }
    .start-scan:active {
      transform: scale(0.97);
      box-shadow: 0 0 16px #3eff9e;
    }
    /* hover effect on desktop (optional) */
    @media (hover: hover) {
      .start-scan:hover {
        background: linear-gradient(95deg, #1aff9a, #00cc66);
        box-shadow: 0 0 16px #2eff9e;
        transform: scale(1.01);
      }
    }

    /* responsive touch / mobile spacing */
    @media (max-width: 400px) {
      .coin-circle {
        width: 60px;
        height: 60px;
        font-size: 1.7rem;
      }
      .content {
        padding: 16px 14px 24px;
      }
      .console-window {
        height: 240px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="glitch-title">⛓️ CRYPTO WALLET SCANNER</div>
      <div class="sub-badge"># TERMINAL_ACCESS v2.4</div>
    </div>

    <!-- Terminal Console Panel -->
    <div class="terminal">
      <div class="terminal-header">
        <div class="led"></div>
        <span>>_ LIVE_WALLET_STREAM</span>
        <div style="flex:1"></div>
        <i class="fas fa-skull" style="color:#2eff9e; font-size:9px;"></i>
      </div>
      <div class="console-window" id="consoleWindow">
        <!-- lines injected via JS, initial placeholder lines will be added at load -->
      </div>
    </div>

    <!-- Found Counter -->
    <div class="counter-row">
      <div class="found-badge">
        <span class="label">FOUND:</span>
        <span class="number" id="foundCount">0</span>
      </div>
      <div class="shield-icon"><i class="fas fa-shield-haltered"></i> DARK_SCAN</div>
    </div>

    <!-- Result Box "Found Wallets Appear Here" -->
    <div class="result-panel" id="resultPanel">
      <h4><i class="fas fa-dragon"></i> FOUND WALLETS APPEAR HERE</h4>
      <div id="walletsList" class="wallets-list">
        <div class="empty-placeholder">⟡ idle — no wallets discovered ⟡</div>
      </div>
    </div>

    <!-- 3x3 Circular Crypto Icons Grid + green checkmark -->
    <div class="coin-grid" id="coinGrid"></div>

    <!-- Start Scan Button (large neon) -->
    <div class="scan-btn-container">
      <button class="start-scan" id="startScanBtn">
        <i class="fas fa-radar"></i> START SCAN
        <i class="fas fa-terminal"></i>
      </button>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  //  COIN DATA: official brand colors + icons
  // --------------------------------------------------------------
  const COINS = [
    { name: "Bitcoin", color: "#f7931a", iconHtml: '<i class="fab fa-bitcoin"></i>' },
    { name: "Ethereum", color: "#627eea", iconHtml: '<i class="fab fa-ethereum"></i>' },
    { name: "Litecoin", color: "#bfbbbb", iconHtml: '<span style="font-weight:bold; font-size:1.7rem;">Ł</span>' },
    { name: "BNB", color: "#f3ba2f", iconHtml: '<span style="font-weight:bold; font-size:1.4rem;">BNB</span>' },
    { name: "Solana", color: "#14F195", iconHtml: '<i class="fas fa-sun" style="color:#121826;"></i>' },
    { name: "Tether", color: "#26A17B", iconHtml: '<i class="fas fa-dollar-sign"></i>' },
    { name: "Bitcoin Cash", color: "#f7a81b", iconHtml: '<i class="fab fa-bitcoin"></i><span style="font-size:0.6rem;">BCH</span>' },
    { name: "Dogecoin", color: "#c2a633", iconHtml: '<i class="fab fa-dog"></i>' },
    { name: "TRON", color: "#ff0015", iconHtml: '<i class="fas fa-bolt"></i>' }
  ];

  // Helper: darker gradient edge (keep radial)
  function buildCircleGradient(baseColor) {
    return `radial-gradient(circle at 30% 30%, ${baseColor}, ${baseColor}cc)`;
  }

  // generate realistic mock wallet address (per coin)
  function generateMockAddress(coinName) {
    const prefixes = {
      "Bitcoin": "bc1q", "Ethereum": "0x", "Litecoin": "ltc1", "BNB": "bnb1",
      "Solana": "Sol", "Tether": "0x", "Bitcoin Cash": "bitcoincash:", "Dogecoin": "D", "TRON": "T"
    };
    let prefix = prefixes[coinName] || "addr";
    let chars = "0123456789abcdef";
    let len = (coinName === "Ethereum" || coinName === "Tether") ? 40 : 28;
    let addr = "";
    for (let i = 0; i < len; i++) addr += chars[Math.floor(Math.random() * chars.length)];
    if (coinName === "Bitcoin") return `${prefix}${addr.slice(0, 28)}`;
    if (coinName === "Dogecoin") return `${prefix}${addr.slice(0, 26)}`;
    if (coinName === "Ethereum") return `${prefix}${addr}`;
    return `${prefix}${addr}`;
  }

  // Render the 3x3 coin grid with green checkmark under each
  function buildCoinGrid() {
    const gridContainer = document.getElementById("coinGrid");
    gridContainer.innerHTML = "";
    COINS.forEach(coin => {
      const coinDiv = document.createElement("div");
      coinDiv.className = "coin-item";
      
      const circle = document.createElement("div");
      circle.className = "coin-circle";
      circle.style.background = buildCircleGradient(coin.color);
      circle.innerHTML = coin.iconHtml;
      
      const checkDiv = document.createElement("div");
      checkDiv.className = "check-icon";
      checkDiv.innerHTML = '<i class="fas fa-check-circle"></i>';
      
      coinDiv.appendChild(circle);
      coinDiv.appendChild(checkDiv);
      gridContainer.appendChild(coinDiv);
    });
  }

  // --------------------------------------------------------------
  //  TERMINAL LOGIC (continuous scrolling lines every 300-400ms)
  // --------------------------------------------------------------
  const consoleWindow = document.getElementById("consoleWindow");
  // phrase pool includes required lines + hacker flavor
  const terminalPhrases = [
    "Wallet Check: energy target ten",
    "Wallet Check: panther click lumber",
    "Wallet Check: glory witness put",
    "Wallet Check: trap trick erode",
    "Wallet Check: strong liberty laundry",
    "Wallet Check: quantum drift flux",
    "Wallet Check: cipher ghost relay",
    "Blockchain handshake :: success",
    "Deep packet inspection :: 0x7F",
    "Mempool sync :: 1423 tx pending",
    "Wallet Check: vanish eclipse orbit",
    "RPC node: latency 0.21ms"
  ];
  
  let terminalInterval = null;
  
  function addConsoleLine(message) {
    const line = document.createElement("div");
    line.className = "console-line";
    line.innerHTML = `> ${message}`;
    consoleWindow.appendChild(line);
    // auto-scroll to bottom
    consoleWindow.scrollTop = consoleWindow.scrollHeight;
    // limit lines to keep performance
    while (consoleWindow.children.length > 180) {
      consoleWindow.removeChild(consoleWindow.firstChild);
    }
  }
  
  function startTerminalStream() {
    if (terminalInterval) clearInterval(terminalInterval);
    terminalInterval = setInterval(() => {
      const randomMsg = terminalPhrases[Math.floor(Math.random() * terminalPhrases.length)];
      addConsoleLine(randomMsg);
    }, Math.floor(Math.random() * 100) + 300); // 300-400ms range
  }
  
  // --------------------------------------------------------------
  //  SCANNING STATE & FOUND WALLETS SIMULATION
  // --------------------------------------------------------------
  let scanInterval = null;
  let isScanning = false;
  let foundWalletsCount = 0;
  const foundCountSpan = document.getElementById("foundCount");
  const walletsListDiv = document.getElementById("walletsList");
  
  // reset found UI
  function resetFoundUI() {
    foundWalletsCount = 0;
    foundCountSpan.innerText = "0";
    walletsListDiv.innerHTML = `<div class="empty-placeholder">⟡ idle — no wallets discovered ⟡</div>`;
  }
  
  // add a new found wallet entry (coin + address)
  function addFoundWalletEntry(coinName, walletAddress) {
    // remove placeholder if present
    if (walletsListDiv.children.length === 1 && walletsListDiv.children[0].classList?.contains("empty-placeholder")) {
      walletsListDiv.innerHTML = "";
    }
    const entryDiv = document.createElement("div");
    entryDiv.className = "wallet-entry";
    const coinTag = document.createElement("span");
    coinTag.className = "coin-tag";
    coinTag.innerText = coinName;
    const addrSpan = document.createElement("span");
    addrSpan.className = "wallet-addr";
    const shortAddr = walletAddress.length > 28 ? walletAddress.slice(0, 18) + "..." + walletAddress.slice(-10) : walletAddress;
    addrSpan.innerText = shortAddr;
    entryDiv.appendChild(coinTag);
    entryDiv.appendChild(addrSpan);
    walletsListDiv.appendChild(entryDiv);
    // scroll result panel to bottom
    const resultPanel = document.getElementById("resultPanel");
    resultPanel.scrollTop = resultPanel.scrollHeight;
  }
  
  // increment found counter and display wallet
  function addFoundWallet(coinName, address) {
    foundWalletsCount++;
    foundCountSpan.innerText = foundWalletsCount;
    addFoundWalletEntry(coinName, address);
    // also log into terminal for extra realism
    addConsoleLine(`[!] FOUND ${coinName} wallet → ${address.slice(0, 16)}...  |  active`);
  }
  
  // scanning tick: picks random coin from COINS list and generates mock wallet
  function performScanTick() {
    if (!isScanning) return;
    const randomCoin = COINS[Math.floor(Math.random() * COINS.length)];
    const mockAddr = generateMockAddress(randomCoin.name);
    addFoundWallet(randomCoin.name, mockAddr);
    // optional: extra scan effect
    if (Math.random() > 0.7) {
      addConsoleLine(`🔍 deep entropy match: ${randomCoin.name} signature detected`);
    }
  }
  
  // stop scanning completely
  function stopScanning() {
    if (scanInterval) {
      clearInterval(scanInterval);
      scanInterval = null;
    }
    isScanning = false;
  }
  
  // start fresh scanning process: reset results + begin detection
  function startScanProcess() {
    // if already scanning, stop previous session first
    if (scanInterval) {
      stopScanning();
    }
    // reset UI & counters
    resetFoundUI();
    // set scanning active flag
    isScanning = true;
    addConsoleLine("🚀 [SCAN_INIT] Engaging deep wallet scanner...");
    addConsoleLine("🚀 monitoring 9 blockchains | heuristic pattern active");
    // scanning interval: generate new wallet every 0.8-1.2 seconds (realistic)
    scanInterval = setInterval(() => {
      if (isScanning) {
        performScanTick();
      } else {
        if (scanInterval) clearInterval(scanInterval);
      }
    }, 950);
    // extra vibe message
    setTimeout(() => {
      if (isScanning) addConsoleLine("⚡ scanning mempool | 3 private keys simulated");
    }, 600);
  }
  
  // --------------------------------------------------------------
  //  INITIALIZE DASHBOARD
  // --------------------------------------------------------------
  function initDashboard() {
    buildCoinGrid();               // 9 circular icons + green check
    // add initial console lines to match requested appearance
    const initialLines = [
      "Wallet Check: energy target ten",
      "Wallet Check: panther click lumber",
      "Wallet Check: glory witness put",
      "Wallet Check: trap trick erode",
      "Wallet Check: strong liberty laundry"
    ];
    // clear any leftover, then add init lines
    consoleWindow.innerHTML = "";
    initialLines.forEach(line => {
      const lineDiv = document.createElement("div");
      lineDiv.className = "console-line";
      lineDiv.innerHTML = `> ${line}`;
      consoleWindow.appendChild(lineDiv);
    });
    // start terminal auto-scroll (every 300-400ms)
    startTerminalStream();
    
    // attach Start Scan button event
    const scanBtn = document.getElementById("startScanBtn");
    scanBtn.addEventListener("click", (e) => {
      e.preventDefault();
      startScanProcess();
      // subtle haptic feedback on mobile (visual)
      scanBtn.style.transform = "scale(0.97)";
      setTimeout(() => { if(scanBtn) scanBtn.style.transform = ""; }, 120);
    });
    
    // initial found counter = 0
    foundWalletsCount = 0;
    foundCountSpan.innerText = "0";
  }
  
  // cleanup intervals on page unload (good practice)
  window.addEventListener("beforeunload", () => {
    if (terminalInterval) clearInterval(terminalInterval);
    if (scanInterval) clearInterval(scanInterval);
  });
  
  // launch everything
  initDashboard();
</script>
</body>
</html>
