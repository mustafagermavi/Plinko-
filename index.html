<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Crash - TON Game</title>
    <style>
        /* ستایلێ گشتی یێ شاشەیێ */
        body {
            margin: 0;
            background-color: #0d1117; /* ڕەنگێ تاریکێ تێلگرام */
            color: white;
            font-family: 'Courier New', Courier, monospace; /* فۆنتەکێ وەک پیکسڵ */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* بۆ ئەوەی پیکسڵ نەرم نەبن و تیژ بمێنن */
            image-rendering: pixelated; 
        }

        /* چوارچۆڤێ یاریێ */
        .game-container {
            width: 90%;
            max-width: 400px;
            background: #161b22;
            border: 4px solid #30363d; /* چوارچۆڤەکێ ستوور */
            border-radius: 0px; /* پیکسڵ پێدڤی ب گۆشەیێن تیژە */
            padding: 20px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); /* سێبەرا پیکسڵی */
        }

        /* جهێ وێنەیێ موشەکێ */
        .stage {
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            background-color: #090c10;
            border: 2px solid #30363d;
        }

        /* وێنەیێ موشەکێ ب ستایلێ Pixel Art */
        #rocket-img {
            width: 50px; /* قەبارێ وێنەی */
            height: auto;
            image-rendering: pixelated; /* گرنگترین بەش بۆ پاراستنا ستایلێ پیکسڵ */
            transition: transform 0.1s linear;
        }

        /* نیشاندانا ژمارا قازانجی */
        #multiplier {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ff00; /* ڕەنگێ سەوزێ کلاسیک یێ کۆمپیوتەری */
            margin: 10px 0;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        /* دوگمەیێن پیکسڵی */
        .btn {
            background-color: #238636; /* سەوزێ تێلگرام */
            border: 4px solid #104e1d;
            border-bottom: 8px solid #104e1d;
            padding: 15px 30px;
            color: white;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .btn:active {
            border-bottom: 4px solid #104e1d;
            transform: translateY(4px);
        }

        .btn:disabled {
            background-color: #444;
            border-color: #222;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #8b949e;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stage">
            <img id="rocket-img" src="https://cdna.artstation.com/p/assets/images/images/019/292/136/original/g6-4-1.gif?1562846985" alt="Pixel Rocket">
        </div>
        
        <div id="multiplier">1.00x</div>
        
        <button id="actionBtn" class="btn" onclick="startGame()">دەستپێبکە (BET)</button>
        <div id="status">ئامادەیە بۆ چاندنێ...</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameInterval;
        let crashPoint;

        // وێنەیێن جودا بۆ حالەتێن جودا
        const rocketGif = "https://cdna.artstation.com/p/assets/images/images/019/292/136/original/g6-4-1.gif?1562846985";
        const explosionGif = "https://i.gifer.com/origin/d7/d7ac6537774061327f300c14441405b0_w200.gif";

        const multiplierEl = document.getElementById('multiplier');
        const rocketImgEl = document.getElementById('rocket-img');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');

        function startGame() {
            if (isRunning) {
                // Cash Out
                stopGame(false);
                return;
            }

            // ئامادەکاریێن یاریێ
            isRunning = true;
            multiplier = 1.00;
            multiplierEl.innerText = "1.00x";
            multiplierEl.style.color = "#00ff00";
            statusEl.innerText = "یا بلند دبیت...";
            actionBtn.innerText = "CASH OUT";
            actionBtn.style.backgroundColor = "#d29922"; // ڕەنگێ پرتەقاڵی بۆ کاش ئاوت
            
            // دانانا وێنەیێ موشەکێ کو بلند دبیت
            rocketImgEl.src = rocketGif;
            rocketImgEl.style.transform = "translateY(0px)";

            // دیارکرنا خاڵا تەقینێ ب شێوەیەکێ هەرەمەکی
            crashPoint = (Math.random() * 4 + 1.1).toFixed(2);

            gameInterval = setInterval(() => {
                multiplier += 0.03;
                multiplierEl.innerText = multiplier.toFixed(2) + "x";
                
                // لێدان (Animation) یا موشەکێ بەرەف سەر
                let height = (multiplier - 1) * 25; // چەند مڵتیپلایەر زێدە بیت، بلندتر لێ دهێت
                if (height > 110) height = 110; // سنووردارکرن کو ژ کەنترۆلی دەرنەکەڤیت
                
                rocketImgEl.style.transform = `translateY(-${height}px) translateX(${(Math.random() - 0.5) * 2}px)`;

                if (multiplier >= crashPoint) {
                    stopGame(true);
                }
            }, 100);
        }

        function stopGame(isCrash) {
            clearInterval(gameInterval);
            isRunning = false;

            if (isCrash) {
                multiplierEl.style.color = "#ff4b2b";
                statusEl.innerText = `💥 تەقیا ل ${multiplier.toFixed(2)}x`;
                // گوهۆڕینا وێنەی بۆ تەقینەکا پیکسڵی
                rocketImgEl.src = explosionGif;
                rocketImgEl.style.transform = "translateY(-50px) scale(1.5)";
            } else {
                multiplierEl.style.color = "#00d2ff";
                statusEl.innerText = `✅ تە قازانج کر! پیرۆزە.`;
                // موشەک یا بەردەوامە ل سەر بلندبوونێ ئەگەر تە کاش ئاوت کر
                rocketImgEl.style.transform = "translateY(-150px)";
            }

            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.style.backgroundColor = "#238636";
        }
    </script>
</body>
</html>
