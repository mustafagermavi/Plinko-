<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON APEX TRADER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff; --neon-green: #39ff14; --neon-red: #ff0055;
            --neon-yellow: #fefe33; --dark-bg: #050508;
        }

        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Press Start 2P', cursive; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Arcade Screen */
        .game-frame {
            width: 92%; max-width: 400px; margin-top: 15px;
            border: 4px solid #1a1a2e; border-radius: 12px;
            background: #000; position: relative;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
        }

        .top-bar {
            padding: 10px; border-bottom: 2px solid #111;
            display: flex; justify-content: space-between; font-size: 8px; color: var(--neon-blue);
        }

        .price-section { padding: 15px 0; text-align: center; }
        #price { font-size: 26px; color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }

        canvas { width: 100%; height: 180px; image-rendering: pixelated; }

        /* Whale Alert Box */
        .whale-box {
            background: rgba(0, 243, 255, 0.05); border: 1px dashed var(--neon-blue);
            margin: 10px; padding: 8px; font-size: 7px; color: var(--neon-blue);
            height: 20px; overflow: hidden; display: flex; align-items: center;
        }

        /* Controls */
        .ui-panel { width: 92%; max-width: 400px; margin-top: 15px; }
        .bet-input {
            width: 100%; background: #000; border: 2px solid #222;
            color: var(--neon-green); font-family: 'Press Start 2P';
            padding: 12px; text-align: center; font-size: 14px; box-sizing: border-box;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn {
            border: 4px solid; padding: 15px; font-family: 'Press Start 2P';
            font-size: 12px; color: white; cursor: pointer; transition: 0.1s;
        }
        .up { background: #064e3b; border-color: var(--neon-green); }
        .down { background: #7f1d1d; border-color: var(--neon-red); }
        .btn:active { transform: scale(0.95); }

        /* History */
        .history { margin-top: 15px; width: 100%; font-size: 7px; color: #444; }
        .hist-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #111; }

        /* Mascot Animation */
        #mascot { position: absolute; bottom: 5px; left: 5px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="game-frame">
        <div class="top-bar">
            <span id="user-name">GUEST</span>
            <span id="balance">1000 PTS</span>
        </div>
        
        <div class="price-section">
            <div id="price">SYNCING...</div>
            <div id="whale-msg" class="whale-box">SCANNING WHALE WALLETS...</div>
        </div>

        <canvas id="chart"></canvas>
        <div id="mascot">👾</div>
    </div>

    <div class="ui-panel">
        <input type="number" id="betAmount" class="bet-input" value="100">
        <div class="btn-grid">
            <button class="btn up" onclick="trade('up')">BULL ▲</button>
            <button class="btn down" onclick="trade('down')">BEAR ▼</button>
        </div>
        <div id="historyList" class="history"></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    if(tg.initDataUnsafe?.user) document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();

    let balance = 1000;
    let currentPrice = 0;
    let prices = Array(50).fill(0);
    let entryPrice = 0;
    let isActive = false;

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 200;

    // 1. نرخە ڕاستەقینەکان
    async function syncPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TONUSDT');
            const data = await res.json();
            let p = parseFloat(data.price);
            if(currentPrice === 0) prices.fill(p);
            currentPrice = p;
            prices.push(p); prices.shift();
            document.getElementById('price').innerText = currentPrice.toFixed(4);
            render();
        } catch(e) {}
    }

    // 2. نەهەنگەکان (Whale Tracker)
    const whaleActions = ["🐳 Whale moved 500k TON to Wallet", "🚀 Huge Buy Order detected!", "📉 Whale dumping 200k TON", "🏦 Institutional Buy in progress"];
    function updateWhale() {
        document.getElementById('whale-msg').innerText = whaleActions[Math.floor(Math.random()*whaleActions.length)];
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Grid
        ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=25) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        
        // Chart Line
        ctx.strokeStyle = isActive ? (currentPrice >= entryPrice ? "#39ff14" : "#ff0055") : "#00f3ff";
        ctx.lineWidth = 4; ctx.beginPath();
        let min = Math.min(...prices), max = Math.max(...prices);
        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * canvas.width;
            let y = canvas.height - ((p - min) / (max - min || 1)) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function trade(dir) {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(amt > balance || isActive) return;

        isActive = true; balance -= amt;
        entryPrice = currentPrice;
        document.getElementById('balance').innerText = `${balance} PTS`;
        document.getElementById('mascot').innerText = "🤔";
        tg.HapticFeedback.impactOccurred('medium');

        setTimeout(() => {
            let win = (dir === 'up' && currentPrice > entryPrice) || (dir === 'down' && currentPrice < entryPrice);
            if(win) {
                balance += Math.floor(amt * 1.9);
                document.getElementById('mascot').innerText = "😎";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                document.getElementById('mascot').innerText = "💀";
                tg.HapticFeedback.notificationOccurred('error');
            }
            addLog(dir, amt, win);
            document.getElementById('balance').innerText = `${balance} PTS`;
            isActive = false;
        }, 5000);
    }

    function addLog(dir, amt, win) {
        const item = document.createElement('div');
        item.className = 'hist-item';
        item.style.color = win ? '#39ff14' : '#ff0055';
        item.innerHTML = `<span>${dir.toUpperCase()} ${amt}</span> <span>${win ? '+'+Math.floor(amt*0.9) : '-'+amt}</span>`;
        document.getElementById('historyList').prepend(item);
    }

    setInterval(syncPrice, 1000);
    setInterval(updateWhale, 7000);
</script>
</body>
</html>
