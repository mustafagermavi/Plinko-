<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Pixel Live</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff0055;
            --dark-bg: #050505;
        }

        body {
            margin: 0; background: var(--dark-bg); color: white;
            font-family: 'Press Start 2P', cursive; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ستایلی شاشەی ئارکەید (CRT Effect) */
        .screen {
            width: 90%; max-width: 380px; margin-top: 20px;
            border: 6px solid #1a1a1a; border-radius: 10px;
            background: #080808; position: relative;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .header {
            padding: 10px; border-bottom: 2px solid #222;
            display: flex; justify-content: space-between; font-size: 8px;
        }

        .live-indicator { color: var(--neon-red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .price-panel {
            padding: 20px 0; text-align: center;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.05) 0%, transparent 100%);
        }

        #price { font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        canvas { 
            width: 100%; height: 160px; 
            image-rendering: pixelated; 
        }

        /* بەشی کۆنتڕۆڵ و دوگمەکان */
        .controls {
            width: 90%; max-width: 380px; margin-top: 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .bet-input {
            grid-column: span 2; background: #111; border: 3px solid #333;
            color: var(--neon-green); font-family: 'Press Start 2P';
            padding: 15px; text-align: center; font-size: 14px; margin-bottom: 10px;
        }

        .btn {
            border: 4px solid; padding: 18px; font-family: 'Press Start 2P';
            font-size: 12px; color: white; cursor: pointer;
            box-shadow: 0 6px 0 #000; transition: 0.1s;
        }
        .btn-up { background: #006400; border-color: var(--neon-green); }
        .btn-down { background: #8B0000; border-color: var(--neon-red); }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* کارەکتەری پیکسڵ (Mascot) */
        .mascot-box {
            position: absolute; bottom: 10px; right: 10px;
            width: 40px; height: 40px; border: 2px solid #222; background: #000;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

    </style>
</head>
<body>

    <div class="screen">
        <div class="header">
            <span><span class="live-indicator">●</span> LIVE TON/USDT</span>
            <span id="balance">CREDITS: 1000</span>
        </div>
        
        <div class="price-panel">
            <div id="price">LOADING...</div>
            <div id="status" style="font-size: 8px; margin-top: 5px; color: #555;">SCANNING NETWORK...</div>
        </div>

        <canvas id="tradeChart"></canvas>

        <div class="mascot-box" id="mascot">🤖</div>
    </div>

    <div class="controls">
        <input type="number" id="betAmount" class="bet-input" value="100">
        <button class="btn btn-up" onclick="startTrade('up')">LONG</button>
        <button class="btn btn-down" onclick="startTrade('down')">SHORT</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = 1000;
    let currentPrice = 0;
    let prices = Array(40).fill(0);
    let isTrading = false;

    const canvas = document.getElementById('tradeChart');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 200;

    // وەرگرتنی نرخی ڕاستەقینە لە Binance
    async function fetchPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TONUSDT');
            const data = await res.json();
            let newPrice = parseFloat(data.price);
            
            if (currentPrice === 0) prices.fill(newPrice);
            currentPrice = newPrice;
            
            prices.push(currentPrice);
            prices.shift();
            
            document.getElementById('price').innerText = currentPrice.toFixed(4);
            draw();
        } catch (e) {
            console.error("Price fetch error");
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Grid lines (بۆ هەستی ئارکەید)
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

        // کێشانی گراف
        ctx.strokeStyle = isTrading ? (currentPrice > entryPrice ? "#39ff14" : "#ff0055") : "#00f3ff";
        ctx.lineWidth = 4;
        ctx.beginPath();
        
        let min = Math.min(...prices);
        let max = Math.max(...prices);
        let range = max - min || 0.01;

        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * canvas.width;
            let y = canvas.height - ((p - min) / range) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    let entryPrice = 0;
    function startTrade(type) {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(amt > balance || isTrading) return;

        isTrading = true;
        balance -= amt;
        entryPrice = currentPrice;
        document.getElementById('balance').innerText = `CREDITS: ${balance}`;
        document.getElementById('status').innerText = `TRADE ACTIVE AT ${entryPrice}`;
        document.getElementById('mascot').innerText = "🔭";

        tg.HapticFeedback.impactOccurred('heavy');

        setTimeout(() => {
            let win = (type === 'up' && currentPrice > entryPrice) || (type === 'down' && currentPrice < entryPrice);
            if(win) {
                balance += Math.floor(amt * 1.9);
                document.getElementById('mascot').innerText = "🤑";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                document.getElementById('mascot').innerText = "📉";
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            document.getElementById('balance').innerText = `CREDITS: ${balance}`;
            document.getElementById('status').innerText = "SCANNING NETWORK...";
            isTrading = false;
        }, 5000);
    }

    setInterval(fetchPrice, 1000); // نوێکردنەوەی نرخ هەر چرکەیەک جارێک
</script>

</body>
</html>
