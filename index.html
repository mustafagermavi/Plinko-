<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet Scanner</title>

<style>

body{
background:#0b0f16;
font-family:monospace;
display:flex;
justify-content:center;
margin:0;
color:#fff;
}

.app{
width:370px;
padding:12px;
}

.header{
text-align:center;
font-size:18px;
margin-bottom:10px;
}

.console{
background:#0f141c;
border:1px solid #2a2f38;
border-radius:8px;
height:240px;
overflow:auto;
padding:10px;
font-size:12px;
}

.line{
margin-bottom:4px;
color:#d0d0d0;
}

.found{
margin-top:8px;
font-size:13px;
}

.seedbox{
margin-top:8px;
height:70px;
background:#0f141c;
border:1px solid #2a2f38;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
color:#777;
}

.coins{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.coin{
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
}

.btc{background:#f7931a;}
.eth{background:#e5e5e5;color:black;}
.ltc{background:#345d9d;}
.bnb{background:#f3ba2f;color:black;}
.sol{background:#000;}
.usdt{background:#26a17b;}
.bch{background:#4cca47;}
.doge{background:#c2a633;}
.trx{background:#e50914;}

.check{
margin-top:6px;
color:#00ff9d;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#00ff9d;
border:none;
border-radius:8px;
font-weight:bold;
font-size:15px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Crypto Wallet Scanner</div>

<div class="console" id="console"></div>

<div class="found">Found: <span id="found">0</span></div>

<div class="seedbox">Found Wallets Appear Here</div>

<div class="coins">

<div class="coin"><div class="icon btc">₿</div><div class="check">✓</div></div>
<div class="coin"><div class="icon eth">Ξ</div><div class="check">✓</div></div>
<div class="coin"><div class="icon ltc">Ł</div><div class="check">✓</div></div>

<div class="coin"><div class="icon bnb">B</div><div class="check">✓</div></div>
<div class="coin"><div class="icon sol">S</div><div class="check">✓</div></div>
<div class="coin"><div class="icon usdt">T</div><div class="check">✓</div></div>

<div class="coin"><div class="icon bch">₿</div><div class="check">✓</div></div>
<div class="coin"><div class="icon doge">Ð</div><div class="check">✓</div></div>
<div class="coin"><div class="icon trx">T</div><div class="check">✓</div></div>

</div>

<button onclick="startScan()">Start Scan</button>

</div>

<script>

const words=[
"panther click lumber",
"energy target ten",
"glory witness put drop",
"trap trick erode jelly",
"strong liberty laundry",
"knock craft stay icon",
"hill feel leave fat",
"enforce claim wonder",
"pass spoon during mist",
"blanket fringe circle",
"castle cabbage exotic",
"birth blossom lunch",
"panic sand fence bull"
]

function startScan(){

const consoleBox=document.getElementById("console")

setInterval(()=>{

let phrase=words[Math.floor(Math.random()*words.length)]

let line=document.createElement("div")

line.className="line"

line.textContent="Wallet Check: "+phrase

consoleBox.appendChild(line)

consoleBox.scrollTop=consoleBox.scrollHeight

},300)

}

</script>

</body>
</html>
