<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Predictor - High Risk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --accent: #00d2ff;
            --green: #0ecb81;
            --red: #f6465d;
            --yellow: #f0b90b;
        }
        body {
            margin: 0; padding: 15px;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        
        /* Bento Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #2b3139; text-align: center; }
        
        .price-box { grid-column: span 2; }
        .price-text { font-size: 40px; font-weight: 800; color: var(--yellow); font-family: monospace; }
        canvas { width: 100%; height: 120px; }

        /* بەشی گرەوکردن */
        .bet-input-box { grid-column: span 2; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        input {
            width: 100%; background: #2b3139; border: 1px solid #474d57;
            border-radius: 10px; padding: 12px; color: white; font-size: 18px; text-align: center;
        }

        .btn { padding: 20px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .up { background: var(--green); }
        .down { background: var(--red); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.3; }

        .balance-text { font-size: 18px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="grid">
        <div class="card">
            <div style="font-size: 12px; color: #848e9c;">باڵانسی تۆ</div>
            <div class="balance-text"><span id="balance">1000</span> Pts</div>
        </div>
        <div class="card">
            <div style="font-size: 12px; color: #848e9c;">قازانج (x1.9)</div>
            <div style="font-size: 18px; font-weight: bold; color: var(--green);">90%</div>
        </div>

        <div class="card price-box">
            <div id="price" class="price-text">5.4200</div>
            <canvas id="chart"></canvas>
        </div>

        <div class="card bet-input-box">
            <span style="font-size: 14px;">بڕی گرەو:</span>
            <input type="number" id="betAmount" value="100" min="10">
        </div>

        <button class="btn up" id="upBtn" onclick="placeBet('up')">UP ▲</button>
        <button class="btn down" id="downBtn" onclick="placeBet('down')">DOWN ▼</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = 1000;
    let currentPrice = 5.4200;
    let prices = Array(40).fill(5.4200);
    let isPlaying = false;
    let entryPrice = 0;

    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    function updatePrice() {
        let change = (Math.random() - 0.5) * 0.006;
        currentPrice = parseFloat((currentPrice + change).toFixed(4));
        prices.push(currentPrice);
        prices.shift();
        document.getElementById('price').innerText = currentPrice.toFixed(4);
        drawChart();
    }

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = isPlaying ? (currentPrice >= entryPrice ? "#0ecb81" : "#f6465d") : "#00d2ff";
        ctx.lineWidth = 3;
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * canvas.width;
            let y = canvas.height - ((p - min) / (max - min)) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function placeBet(type) {
        let amount = parseInt(document.getElementById('betAmount').value);
        if (amount > balance || amount <= 0) {
            alert("باڵانست بەش ناکات!");
            return;
        }

        isPlaying = true;
        balance -= amount;
        document.getElementById('balance').innerText = balance;
        entryPrice = currentPrice;
        
        document.getElementById('upBtn').disabled = true;
        document.getElementById('downBtn').disabled = true;

        tg.HapticFeedback.impactOccurred('medium');

        setTimeout(() => {
            let win = (type === 'up' && currentPrice > entryPrice) || (type === 'down' && currentPrice < entryPrice);
            if (win) {
                let profit = Math.floor(amount * 1.9);
                balance += profit;
                document.getElementById('balance').innerText = balance;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }

            isPlaying = false;
            document.getElementById('upBtn').disabled = false;
            document.getElementById('downBtn').disabled = false;
        }, 5000); // ٥ چرکە بۆ چاوەڕێی ئەنجام
    }

    setInterval(updatePrice, 150);
</script>

</body>
</html>
