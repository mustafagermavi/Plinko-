<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Rocket - High End Edition</title>
    <style>
        :root {
            --gold: #f59e0b;
            --gold-light: #fbbf24;
            --cyber-blue: #38bdf8;
            --bg-deep: #020617;
        }

        body {
            margin: 0; background-color: var(--bg-deep);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }

        /* 1. پاشبنەمایێ پرۆفیشناڵ ب سێبەرا شین */
        #game-screen {
            width: 360px; height: 500px;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            border: 2px solid #334155; position: relative;
            overflow: hidden; border-radius: 20px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.1);
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; }

        /* 2. دیزاینێ موشەکا زێڕی (Vector-Pixel Style) */
        #rocket-container {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
        }

        #rocket {
            width: 38px; height: 70px; background: var(--gold);
            border: 3px solid #000; position: relative;
            box-shadow: inset -8px 0px 0px #b45309, inset 4px 0px 0px var(--gold-light);
        }

        #rocket::before { /* سەرێ موشەکێ */
            content: ""; position: absolute; top: -18px; left: -3px;
            width: 38px; height: 15px; background: #1e293b;
            border: 3px solid #000; box-shadow: inset -6px 0px 0px #0f172a;
        }

        .window {
            position: absolute; top: 15px; left: 10px;
            width: 12px; height: 12px; background: var(--cyber-blue);
            border: 3px solid #000; box-shadow: 0 0 10px var(--cyber-blue);
        }

        .wing { position: absolute; bottom: 5px; width: 14px; height: 25px; background: #1e293b; border: 3px solid #000; }
        .wing-l { left: -20px; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        .wing-r { right: -20px; clip-path: polygon(0 0, 0 100%, 100% 100%); }

        .thruster {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 25px; background: var(--cyber-blue);
            box-shadow: 0 0 20px var(--cyber-blue); display: none;
            animation: pulse 0.1s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.7; height: 20px; } 100% { opacity: 1; height: 30px; } }

        /* 3. UI - Modern Glassmorphism */
        #multiplier {
            position: absolute; top: 50px; width: 100%; text-align: center;
            font-size: 4rem; font-weight: 900; color: white;
            letter-spacing: -2px; z-index: 10;
        }

        .controls {
            width: 360px; background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px); padding: 25px;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%; padding: 18px; font-size: 1.2rem; font-weight: bold;
            color: #020617; background: var(--gold); border: none;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn.cashout { background: var(--cyber-blue); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="rocket-container">
            <div id="rocket">
                <div class="window"></div>
                <div class="wing wing-l"></div>
                <div class="wing wing-r"></div>
                <div class="thruster" id="fire"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">Start Flight</button>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const rocketCont = document.getElementById('rocket-container');
        const fire = document.getElementById('fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
            actionBtn.innerText = "Cash Out";
            actionBtn.classList.add('cashout');
            fire.style.display = 'block';

            gameLoop = setInterval(() => {
                multiplier += 0.03;
                multEl.innerText = multiplier.toFixed(2) + "x";
                let yPos = Math.min((multiplier - 1) * 60, 280);
                rocketCont.style.bottom = (50 + yPos) + 'px';

                if (multiplier >= crashPoint) endGame(true);
            }, 80);
        }

        function cashOut() {
            endGame(false);
            rocketCont.style.transition = "bottom 1s ease-in";
            rocketCont.style.bottom = "800px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            fire.style.display = 'none';
            actionBtn.innerText = "Try Again";
            actionBtn.classList.remove('cashout');
            if (isCrash) {
                multEl.style.color = "#ef4444";
                rocketCont.style.display = 'none';
                setTimeout(() => {
                    rocketCont.style.display = 'block';
                    rocketCont.style.bottom = '50px';
                    multEl.style.color = 'white';
                }, 1000);
            }
        }
    </script>
</body>
</html>
