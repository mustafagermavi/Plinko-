<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Crypto Scanner UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --primary: #818cf8;
            --accent: #2dd4bf;
            --danger: #fb7185;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(129, 140, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.1) 0px, transparent 50%);
            color: #f3f4f6;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Main Dashboard */
        .dashboard {
            width: 440px;
            background: var(--card);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 32px;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
        }

        /* Header Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .badge {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(45, 212, 191, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(45, 212, 191, 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(45, 212, 191, 0); }
        }

        /* Terminal - CRT Style */
        .terminal {
            background: #000;
            border-radius: 24px;
            padding: 20px;
            height: 200px;
            border: 1px solid #1f2937;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            box-shadow: inset 0 0 30px rgba(129, 140, 248, 0.05);
        }

        .terminal::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .log-line { color: #94a3b8; margin-bottom: 6px; }
        .log-line span { color: var(--primary); }

        /* Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .coin-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .coin-item:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .coin-item svg {
            width: 36px;
            height: 36px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Fancy Toggle */
        .toggle {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--primary);
            position: relative;
            background: transparent;
        }

        .coin-item.active .toggle::after {
            content: "✓";
            color: var(--primary);
            font-size: 14px;
            position: absolute;
            top: -2px; left: 2px;
            font-weight: bold;
        }

        /* Action Button */
        .btn-launch {
            width: 100%;
            padding: 20px;
            margin-top: 32px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transition: 0.3s;
        }

        .btn-launch:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
        }

        .btn-launch:active { transform: translateY(1px); }

    </style>
</head>
<body>

<div class="dashboard">
    <div class="status-bar">
        <div class="badge">
            <div class="pulse"></div>
            SYSTEM ACTIVE
        </div>
        <div style="text-align: right">
            <div style="font-size: 10px; color: #64748b;">CHECKED</div>
            <div id="count" style="font-family: 'JetBrains Mono'; font-weight: bold; color: var(--primary);">2,840,102</div>
        </div>
    </div>

    <div class="terminal" id="screen">
        <div class="log-line"><span>[SYS]</span> Initializing neural link...</div>
        <div class="log-line"><span>[SYS]</span> Ready to analyze entropy.</div>
    </div>

    <div class="bento-grid">
        <div class="coin-item active">
            <svg viewBox="0 0 32 32"><path fill="#F7931A" d="M16 32c8.837 0 16-7.163 16-16S24.837 0 16 0 0 7.163 0 16s7.163 16 16 16z"/><path fill="#FFF" d="M23.189 14.022c.336-2.247-1.374-3.455-3.712-4.26l.758-3.04-1.85-.461-.738 2.961c-.486-.121-.984-.236-1.48-.349l.744-2.984-1.85-.461-.758 3.038c-.403-.092-.802-.181-1.189-.275l.001-.005-2.552-.637-.492 1.976s1.373.315 1.344.334c.75.187.885.684.862 1.078l-.864 3.464c.051.013.118.032.191.061l-.193-.048-1.21 4.857c-.092.23-.326.575-.85.445.02.03-1.344-.334-1.344-.334l-.918 2.116 2.408.6c.447.112.886.228 1.319.336l-.768 3.085 1.849.461.758-3.041c.504.137 1.0.264 1.489.385l-.756 3.033 1.85.461.767-3.076c3.155.597 5.531.356 6.53-2.497.804-2.296-.04-3.621-1.698-4.485 1.206-.279 2.114-1.074 2.357-2.713zm-4.215 5.923c-.572 2.298-4.439 1.056-5.694.744l1.016-4.075c1.255.313 5.27.931 4.678 3.331zm.573-5.955c-.521 2.088-3.743 1.028-4.788.769l.922-3.698c1.045.26 4.398.745 3.866 2.929z"/></svg>
            <div class="toggle"></div>
        </div>
        <div class="coin-item active">
            <svg viewBox="0 0 32 32"><path fill="#627EEA" d="M16 32c8.837 0 16-7.163 16-16S24.837 0 16 0 0 7.163 0 16s7.163 16 16 16z"/><path fill="#FFF" fill-opacity=".602" d="M16.498 4v8.87l7.497 3.35z"/><path fill="#FFF" d="M16.498 4L9 16.22l7.498-3.35z"/><path fill="#FFF" fill-opacity=".602" d="M16.498 21.968v6.027L24 17.616z"/><path fill="#FFF" d="M16.498 27.995v-6.028L9 17.616z"/><path fill="#FFF" fill-opacity=".2" d="M16.498 20.573l7.497-4.353-7.497-3.348z"/><path fill="#FFF" fill-opacity=".602" d="M9 16.22l7.498 4.353v-7.701z"/></svg>
            <div class="toggle"></div>
        </div>
        <div class="coin-item active">
            <svg viewBox="0 0 32 32"><path fill="#0088CC" d="M16 32c8.837 0 16-7.163 16-16S24.837 0 16 0 0 7.163 0 16s7.163 16 16 16z"/><path fill="#FFF" d="M16 23.5c-.2 0-.4-.1-.5-.2l-8.5-7.5c-.3-.3-.4-.7-.2-1.1s.6-.6 1-.6h16.4c.4 0 .8.2 1 .6s.1.8-.2 1.1l-8.5 7.5c-.1.1-.3.2-.5.2zM10.8 16l5.2 4.6 5.2-4.6h-10.4z"/></svg>
            <div class="toggle"></div>
        </div>
    </div>

    <button class="btn-launch" onclick="execute()">EXECUTE PROTOCOL</button>
</div>

<script>
    function execute() {
        const screen = document.getElementById('screen');
        const count = document.getElementById('count');
        let val = 2840102;

        setInterval(() => {
            val += Math.floor(Math.random() * 20);
            count.innerText = val.toLocaleString();

            const hex = Array.from({length: 8}, () => Math.floor(Math.random()*16).toString(16)).join('').toUpperCase();
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerHTML = `<span>[DATA]</span> Hash: 0x${hex}... <b style="color:#fb7185">NOT FOUND</b>`;
            
            screen.appendChild(div);
            if(screen.childNodes.length > 12) screen.removeChild(screen.firstChild);
            screen.scrollTop = screen.scrollHeight;
        }, 60);
    }
</script>

</body>
</html>
