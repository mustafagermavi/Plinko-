<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Wallet Scanner | Terminal</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --neon-blue: #00d4ff;
            --text-main: #e0e0e0;
            --terminal-text: #00ff41;
            --border-glow: rgba(0, 255, 65, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Main Dashboard Container */
        .dashboard {
            width: 360px;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 1), 0 0 15px var(--border-glow);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid var(--neon-blue);
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            display: block;
        }

        #checked-count { color: var(--neon-blue); }
        #found-count { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }

        /* Terminal Console */
        .terminal {
            background: #000;
            height: 180px;
            border-radius: 4px;
            padding: 10px;
            font-size: 0.75rem;
            overflow-y: hidden;
            border: 1px solid #222;
            margin-bottom: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .terminal-line {
            line-height: 1.4;
            color: var(--terminal-text);
            opacity: 0.8;
            white-space: nowrap;
        }

        .terminal-line.hit {
            color: #fff;
            background: rgba(0, 255, 65, 0.2);
            font-weight: bold;
            padding: 2px 0;
            animation: pulse-hit 0.5s infinite;
        }

        /* Crypto Grid */
        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
            background: #050505;
            border-radius: 8px;
        }

        .crypto-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .icon-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 5px;
            border: 2px solid transparent;
            color: white;
        }

        .check-mark {
            font-size: 10px;
            color: var(--neon-blue);
            opacity: 0.5;
        }

        .scanning .check-mark {
            animation: blink 1s infinite;
        }

        /* Control Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #start-btn {
            background: #004d1a;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        #start-btn:hover { background: var(--neon-green); color: #000; }

        #stop-btn {
            background: #4d0000;
            color: var(--neon-red);
            border: 1px solid var(--neon-red);
        }

        #stop-btn:hover { background: var(--neon-red); color: #000; }

        /* Notification */
        #alert-box {
            position: fixed;
            top: 20px;
            right: -300px;
            width: 250px;
            background: #00ff41;
            color: #000;
            padding: 15px;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 0 20px var(--neon-green);
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
        }

        #alert-box.show { right: 20px; }

        /* Animations */
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @keyframes pulse-hit {
            0% { box-shadow: 0 0 0px var(--neon-green); }
            50% { box-shadow: 0 0 10px var(--neon-green); }
            100% { box-shadow: 0 0 0px var(--neon-green); }
        }

        /* Specific Coin Colors */
        .btc { background: #F7931A; }
        .eth { background: #627EEA; }
        .ltc { background: #345D9D; }
        .bnb { background: #F3BA2F; }
        .sol { background: #14F195; }
        .usdt { background: #26A17B; }
        .bch { background: #8BC34A; }
        .doge { background: #C2A633; }
        .trx { background: #FF0013; }

    </style>
</head>
<body>

    <div id="alert-box">⚠️ BALANCE FOUND!</div>

    <div class="dashboard">
        <h1>CRYPTO WALLET SCANNER</h1>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Checked</span>
                <span class="stat-value" id="checked-count">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Found</span>
                <span class="stat-value" id="found-count">0</span>
            </div>
        </div>

        <div class="terminal" id="terminal">
            <div class="terminal-line">SYSTEM READY...</div>
            <div class="terminal-line">WAITING FOR COMMAND_</div>
        </div>

        <div class="crypto-grid" id="crypto-grid">
            <div class="crypto-item"><div class="icon-circle btc">₿</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle eth">Ξ</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle ltc">Ł</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle bnb">BNB</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle sol">S</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle usdt">₮</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle bch">BCH</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle doge">Ð</div><span class="check-mark">✓</span></div>
            <div class="crypto-item"><div class="icon-circle trx">TRX</div><span class="check-mark">✓</span></div>
        </div>

        <div class="controls">
            <button id="start-btn">START SCAN</button>
            <button id="stop-btn">STOP</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const checkedEl = document.getElementById('checked-count');
        const foundEl = document.getElementById('found-count');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const alertBox = document.getElementById('alert-box');
        const cryptoGrid = document.getElementById('crypto-grid');

        let isScanning = false;
        let checkedCount = 0;
        let foundCount = 0;
        let scanInterval;

        const words = ["fluid", "busy", "gate", "deny", "pumpkin", "fossil", "radar", "puppy", "analyst", "category", "animal", "couch", "universe", "cream", "limit", "soul", "anxiety", "economy", "rescue", "retreat", "labor", "antenna", "victory", "shadow", "matrix", "cipher"];

        const hits = [
            { text: "0.004 BTC = 268$", icon: "₿" },
            { text: "432.39 USDT.TRC20 = 432.33$", icon: "₮" },
            { text: "0.72 ETH = 1500$", icon: "Ξ" }
        ];

        function generatePhrase() {
            let phrase = [];
            for(let i=0; i<4; i++) {
                phrase.push(words[Math.floor(Math.random() * words.length)]);
            }
            return phrase.join(" ");
        }

        function addTerminalLine(text, isHit = false) {
            const line = document.createElement('div');
            line.className = 'terminal-line' + (isHit ? ' hit' : '');
            line.textContent = isHit ? `>> SUCCESS: ${text}` : `Wallet Check: ${text}`;
            terminal.appendChild(line);
            
            if (terminal.childNodes.length > 50) {
                terminal.removeChild(terminal.firstChild);
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        function triggerAlert() {
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 3000);
        }

        function startScan() {
            if (isScanning) return;
            isScanning = true;
            cryptoGrid.classList.add('scanning');
            
            scanInterval = setInterval(() => {
                // Update counter
                checkedCount += Math.floor(Math.random() * 3) + 1;
                checkedEl.textContent = checkedCount.toLocaleString();

                // Logic for finding balance (Rare: 1 in 500 chance per tick ~ roughly every few thousand scans)
                const luckyDip = Math.floor(Math.random() * 800);
                
                if (luckyDip === 7) {
                    foundCount++;
                    foundEl.textContent = foundCount;
                    const hit = hits[Math.floor(Math.random() * hits.length)];
                    addTerminalLine(`${hit.icon} ${hit.text}`, true);
                    triggerAlert();
                } else {
                    addTerminalLine(generatePhrase());
                }

            }, Math.random() * (350 - 200) + 200);
        }

        function stopScan() {
            isScanning = false;
            cryptoGrid.classList.remove('scanning');
            clearInterval(scanInterval);
            addTerminalLine("--- SCAN PAUSED ---");
        }

        startBtn.addEventListener('click', startScan);
        stopBtn.addEventListener('click', stopScan);
    </script>
</body>
</html>
