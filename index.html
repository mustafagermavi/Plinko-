<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Rocket Crash - Ultimate Edition</title>
    <style>
        :root {
            --bg-space: #020617;
            --primary-neon: #00ffa3;
            --r-body: #f1f5f9;
            --r-shade: #cbd5e1;
            --r-accent: #ef4444;
            --r-accent-dark: #b91c1c;
        }

        body {
            margin: 0; background-color: var(--bg-space);
            color: white; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            image-rendering: pixelated;
        }

        /* 1. پاشبنەما (بێ دەستکاری) */
        #game-screen {
            width: 360px; height: 500px;
            background: linear-gradient(to bottom, #020617, #0f172a);
            border: 4px solid #334155; position: relative;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .star { position: absolute; background: white; width: 2px; height: 2px; opacity: 0.5; }

        /* 2. پرۆفیشناڵترین دیزاینێ موشەکا پیکسڵی */
        #rocket-container {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
            z-index: 5;
        }

        #rocket {
            width: 42px; height: 80px; background: var(--r-body);
            position: relative; border: 4px solid #000;
            box-shadow: inset -10px 0px 0px var(--r-shade), inset 4px 0px 0px #ffffff;
        }

        #rocket::before { /* سەرێ موشەکێ */
            content: ""; position: absolute; top: -22px; left: -4px;
            width: 42px; height: 18px; background: var(--r-accent);
            border: 4px solid #000; box-shadow: inset -10px 0px 0px var(--r-accent-dark), inset 4px 0px 0px #f87171;
        }

        .window {
            position: absolute; top: 20px; left: 11px;
            width: 14px; height: 14px; background: #38bdf8;
            border: 4px solid #000; box-shadow: inset -4px -4px 0px #0ea5e9;
        }

        .wing { position: absolute; bottom: 5px; width: 16px; height: 28px; background: var(--r-accent); border: 4px solid #000; }
        .wing-l { left: -24px; box-shadow: inset 6px 0px 0px var(--r-accent-dark); clip-path: polygon(100% 0, 100% 100%, 0 100%); }
        .wing-r { right: -24px; box-shadow: inset -6px 0px 0px var(--r-accent-dark); clip-path: polygon(0 0, 0 100%, 100% 100%); }

        .engine-block { position: absolute; bottom: -8px; left: 4px; width: 26px; height: 8px; background: #475569; border: 4px solid #000; }

        .exhaust-flame {
            position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 30px; background: #fbbf24; display: none;
            box-shadow: 0 8px 0 #f97316, 0 16px 0 #ef4444;
            animation: thrust 0.1s infinite;
        }

        @keyframes thrust {
            0% { height: 25px; transform: translateX(-50%) scaleX(1); }
            50% { height: 35px; transform: translateX(-50%) scaleX(1.1); }
            100% { height: 25px; transform: translateX(-50%) scaleX(1); }
        }

        /* 3. پارتیکڵێن تەقینێ (Particles) */
        .particle {
            position: absolute; width: 6px; height: 6px;
            pointer-events: none; z-index: 10;
        }

        /* 4. UI و پانێلا کەنترۆلێ */
        #multiplier {
            position: absolute; top: 40px; width: 100%; text-align: center;
            font-size: 3.8rem; font-weight: bold; color: var(--primary-neon);
            text-shadow: 5px 5px 0px #000; z-index: 20;
        }

        .controls {
            width: 360px; background: #111827; padding: 25px;
            border: 4px solid #334155; border-top: none; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 18px; font-size: 1.5rem; color: white;
            background: #16a34a; border: none; border-bottom: 8px solid #14532d;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer;
        }

        .btn.cashout { background: #ca8a04; border-bottom-color: #713f12; }
        .btn:active { transform: translateY(4px); border-bottom-width: 4px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="rocket-container">
            <div id="rocket">
                <div class="window"></div>
                <div class="wing wing-l"></div>
                <div class="wing wing-r"></div>
                <div class="engine-block"></div>
                <div class="exhaust-flame" id="fire"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">BET TON</button>
        <div id="status">ئامادەیە بۆ گەشتەکا نوی...</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const rocketCont = document.getElementById('rocket-container');
        const rocketBody = document.getElementById('rocket');
        const fire = document.getElementById('fire');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');
        const screen = document.getElementById('game-screen');

        // دروستکرنا ستارەیان
        function spawnStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 350 + 'px';
            star.style.top = '-10px';
            screen.appendChild(star);
            let pos = -10;
            let move = setInterval(() => {
                pos += 4;
                star.style.top = pos + 'px';
                if (pos > 500) { clearInterval(move); star.remove(); }
            }, 30);
        }

        // سیستمێ تەقینا پیکسڵی
        function explode(x, y) {
            const colors = ['#ef4444', '#f59e0b', '#f1f5f9', '#475569'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                screen.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;

                let pMove = setInterval(() => {
                    let px = parseFloat(p.style.left);
                    let py = parseFloat(p.style.top);
                    p.style.left = (px + vx) + 'px';
                    p.style.top = (py + vy) + 'px';
                    vy += 0.2; // Gravity
                    if (py > 500) { clearInterval(pMove); p.remove(); }
                }, 20);
            }
        }

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 6 + 1.2).toFixed(2);
            
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            fire.style.display = 'block';
            rocketBody.style.display = 'block';
            statusEl.innerText = "موشەک یا بلند دبیت...";
            multEl.style.color = "var(--primary-neon)";

            let starInterval = setInterval(() => { if(!isRunning) clearInterval(starInterval); spawnStar(); }, 80);

            gameLoop = setInterval(() => {
                multiplier += 0.04;
                multEl.innerText = multiplier.toFixed(2) + "x";

                let yPos = Math.min((multiplier - 1) * 55, 270);
                rocketCont.style.bottom = (50 + yPos) + 'px';
                rocketCont.style.transform = `translateX(-50%) rotate(${(Math.random()-0.5)*6}deg)`;

                if (multiplier >= crashPoint) endGame(true);
            }, 100);
        }

        function cashOut() {
            endGame(false);
            statusEl.innerText = `💰 پیرۆزە! تە ${multiplier.toFixed(2)}x بردی.`;
            multEl.style.color = "#38bdf8";
            rocketCont.style.transition = "bottom 1.5s ease-in";
            rocketCont.style.bottom = "800px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            fire.style.display = 'none';
            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.classList.remove('cashout');

            if (isCrash) {
                const rect = rocketCont.getBoundingClientRect();
                const screenRect = screen.getBoundingClientRect();
                explode(rect.left - screenRect.left + 20, rect.top - screenRect.top + 40);
                
                statusEl.innerText = "💥 تەقیا! تە دۆڕاندن.";
                multEl.style.color = "#ef4444";
                rocketBody.style.display = 'none';
            }
        }
    </script>
</body>
</html>
