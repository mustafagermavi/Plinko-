<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Rocket Crash - TON Game</title>
    <style>
        /* 1. ستایلێ گشتی */
        body {
            margin: 0;
            background-color: #05080a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* 2. پاشبنەمایێ ئاسمانی (The Space) */
        #game-screen {
            width: 350px;
            height: 450px;
            background: linear-gradient(to bottom, #020617, #0f172a);
            border: 4px solid #334155;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ستارەیێن پیکسڵی یێن لڤۆک */
        .star {
            position: absolute;
            background: white;
            width: 2px;
            height: 2px;
            opacity: 0.5;
        }

        /* 3. موشەکا پیکسڵی (CSS Pixel Art) */
        #rocket {
            position: absolute;
            bottom: 50px;
            left: calc(50% - 15px);
            width: 30px;
            height: 45px;
            background: #e2e8f0; /* لەشێ موشەکێ */
            transition: transform 0.1s linear;
        }

        #rocket::before { /* سەرێ موشەکێ */
            content: ""; position: absolute;
            top: -10px; left: 0;
            width: 30px; height: 10px;
            background: #ef4444;
        }

        #rocket::after { /* ئاگرێ ژ بن موشەکێ */
            content: ""; position: absolute;
            bottom: -15px; left: 5px;
            width: 20px; height: 15px;
            background: #f59e0b;
            box-shadow: 0 5px 0 #ef4444;
            display: none; /* بتنێ دەمێ یاری دەستپێدکەت دیار دبیت */
        }

        .engine-on #rocket::after { display: block; }

        /* 4. نیشاندانا مڵتیپلایەر (Multiplier) */
        #multiplier {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            color: #22c55e;
            text-shadow: 3px 3px 0px #000;
            z-index: 10;
        }

        /* 5. پانێلا کەنترۆلێ */
        .controls {
            width: 350px;
            background: #1e293b;
            padding: 20px;
            border: 4px solid #334155;
            border-top: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: white;
            background: #22c55e;
            border: none;
            border-bottom: 6px solid #166534;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:active {
            border-bottom: 2px solid #166534;
            transform: translateY(4px);
        }

        .btn.cashout { background: #eab308; border-bottom-color: #a16207; }
        .btn:disabled { background: #475569; border-bottom-color: #1e293b; cursor: not-allowed; }

        #message { margin-top: 10px; text-align: center; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body class="">

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="rocket"></div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">BET TON</button>
        <div id="message">ئامادەیە بۆ دەستپێکرن</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameInterval;
        let starInterval;
        let crashPoint;

        const rocket = document.getElementById('rocket');
        const multiplierEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const messageEl = document.getElementById('message');
        const gameScreen = document.getElementById('game-screen');

        // دروستکرنا ستارەیێن پیکسڵی ب شێوەیەکێ هەرەمەکی
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 350 + 'px';
            star.style.top = '-10px';
            gameScreen.appendChild(star);

            let pos = -10;
            let interval = setInterval(() => {
                pos += 2;
                star.style.top = pos + 'px';
                if (pos > 450) {
                    clearInterval(interval);
                    star.remove();
                }
            }, 20);
        }

        function handleAction() {
            if (!isRunning) {
                startGame();
            } else {
                cashOut();
            }
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.1).toFixed(2); // خاڵا تەقینێ هەرەمەکی
            
            document.body.classList.add('engine-on');
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            messageEl.innerText = "موشەک یا بلند دبیت...";
            multiplierEl.style.color = "#22c55e";

            // لڤینا ستارەیان
            starInterval = setInterval(createStar, 100);

            gameInterval = setInterval(() => {
                multiplier += 0.02;
                multiplierEl.innerText = multiplier.toFixed(2) + "x";

                // بلندکرنا موشەکێ (Animation)
                let yMove = Math.min((multiplier - 1) * 40, 200);
                rocket.style.transform = `translateY(-${yMove}px) translateX(${(Math.random()-0.5)*4}px)`;

                if (multiplier >= crashPoint) {
                    crash();
                }
            }, 100);
        }

        function cashOut() {
            stopGame();
            messageEl.innerText = `تە قازانج کر! مڵتیپلایەر: ${multiplier.toFixed(2)}x`;
            multiplierEl.style.color = "#38bdf8";
            rocket.style.transform = "translateY(-500px)"; // موشەک دچیتە دەرڤەی شاشەیێ
        }

        function crash() {
            stopGame();
            messageEl.innerText = "💥 موشەک تەقیا! تە دۆراندن.";
            multiplierEl.style.color = "#ef4444";
            rocket.innerHTML = "💥";
            rocket.style.background = "transparent";
            rocket.style.boxShadow = "none";
        }

        function stopGame() {
            clearInterval(gameInterval);
            clearInterval(starInterval);
            isRunning = false;
            document.body.classList.remove('engine-on');
            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.classList.remove('cashout');
        }
    </script>
</body>
</html>
