<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Dino Crash - TON Game</title>
    <style>
        :root {
            --bg-space: #020617;
            --primary-neon: #00ffa3;
            /* Dino Colors */
            --dino-main: #22c55e;
            --dino-shade: #166534;
            --dino-belly: #a3e635;
        }

        body {
            margin: 0; background-color: var(--bg-space);
            color: white; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            image-rendering: pixelated;
        }

        /* 1. پاشبنەما (بێ دەستکاری) */
        #game-screen {
            width: 360px; height: 500px;
            background: linear-gradient(to bottom, #020617, #0f172a);
            border: 4px solid #334155; position: relative;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .star { position: absolute; background: white; width: 2px; height: 2px; opacity: 0.5; }

        /* 2. دیزاینێ دیناسۆرێ قه‌له‌و یێ پیکسڵی (CSS Only) */
        #dino-container {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); transition: bottom 0.1s linear;
            z-index: 5;
        }

        #dino {
            width: 48px; height: 55px; background: var(--dino-main);
            position: relative; border: 4px solid #000;
            box-shadow: inset -10px -10px 0px var(--dino-shade);
        }

        /* سه‌ر و ده‌ڤێ دیناسۆری */
        #dino::before {
            content: ""; position: absolute; top: 10px; left: -10px;
            width: 25px; height: 20px; background: var(--dino-main);
            border: 4px solid #000; box-shadow: inset -5px -5px 0px var(--dino-shade);
        }

        /* چاڤێ دیناسۆری */
        #dino::after {
            content: ""; position: absolute; top: 16px; left: -2px;
            width: 6px; height: 6px; background: #000; z-index: 10;
        }

        /* زكێ سپی یێ دیناسۆری (قه‌له‌وی) */
        .belly {
            position: absolute; bottom: 5px; left: 8px;
            width: 28px; height: 35px; background: var(--dino-belly);
            border: 4px solid #000;
        }

        /* باڵێن سپی یێن بچووك (بۆ ئه‌وێ ب كه‌یف بیت) */
        .wing {
            position: absolute; top: 10px; left: 35px;
            width: 15px; height: 10px; background: #f1f5f9;
            border: 3px solid #000;
            animation: flap 0.1s infinite;
        }

        @keyframes flap {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        /* 3. پارتیکڵێن تەقینێ و هێكا شكه‌ستی */
        .particle { position: absolute; width: 6px; height: 6px; pointer-events: none; z-index: 10; }
        #egg-shell {
            width: 30px; height: 40px; background: #f1f5f9;
            border: 4px solid #000; position: absolute;
            display: none; z-index: 4;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 30% 60%, 70% 60%);
        }

        /* 4. UI و پانێلا کەنترۆلێ */
        #multiplier {
            position: absolute; top: 40px; width: 100%; text-align: center;
            font-size: 3.8rem; font-weight: bold; color: var(--primary-neon);
            text-shadow: 5px 5px 0px #000; z-index: 20;
        }

        .controls {
            width: 360px; background: #111827; padding: 25px;
            border: 4px solid #334155; border-top: none; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 18px; font-size: 1.5rem; color: white;
            background: #16a34a; border: none; border-bottom: 8px solid #14532d;
            font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer;
        }

        .btn.cashout { background: #ca8a04; border-bottom-color: #713f12; }
        .btn:active { transform: translateY(4px); border-bottom-width: 4px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="dino-container">
            <div id="dino">
                <div class="belly"></div>
                <div class="wing"></div>
            </div>
            <div id="egg-shell"></div> </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">BET TON</button>
        <div id="status">ئامادەیە بۆ فڕینێ...</div>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const dinoCont = document.getElementById('dino-container');
        const dinoBody = document.getElementById('dino');
        const eggShell = document.getElementById('egg-shell');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');
        const statusEl = document.getElementById('status');
        const screen = document.getElementById('game-screen');

        // دروستکرنا ستارەیان
        function spawnStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 350 + 'px';
            star.style.top = '-10px';
            screen.appendChild(star);
            let pos = -10;
            let move = setInterval(() => {
                pos += 4;
                star.style.top = pos + 'px';
                if (pos > 500) { clearInterval(move); star.remove(); }
            }, 30);
        }

        // سیستمێ تەقینا پیکسڵی و هێكا شكه‌ستی
        function explode(x, y) {
            const colors = ['#ef4444', '#f59e0b', '#f1f5f9', '#22c55e', '#a3e635'];
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                screen.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;

                let pMove = setInterval(() => {
                    let px = parseFloat(p.style.left);
                    let py = parseFloat(p.style.top);
                    p.style.left = (px + vx) + 'px';
                    p.style.top = (py + vy) + 'px';
                    vy += 0.2; // Gravity
                    if (py > 500) { clearInterval(pMove); p.remove(); }
                }, 20);
            }
        }

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true;
            multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.2).toFixed(2);
            
            actionBtn.innerText = "CASH OUT";
            actionBtn.classList.add('cashout');
            dinoBody.style.display = 'block';
            eggShell.style.display = 'none';
            statusEl.innerText = "دیناسۆرێ قه‌له‌و یێ بلند دبیت!";
            multEl.style.color = "var(--primary-neon)";

            let starInterval = setInterval(() => { if(!isRunning) clearInterval(starInterval); spawnStar(); }, 80);

            gameLoop = setInterval(() => {
                multiplier += 0.04;
                multEl.innerText = multiplier.toFixed(2) + "x";

                let yPos = Math.min((multiplier - 1) * 55, 270);
                dinoCont.style.bottom = (50 + yPos) + 'px';
                dinoCont.style.transform = `translateX(-50%) rotate(${(Math.random()-0.5)*7}deg)`;

                if (multiplier >= crashPoint) endGame(true);
            }, 100);
        }

        function cashOut() {
            endGame(false);
            statusEl.innerText = `✅ دیناسۆری پارە بردی! مڵتیپلایەر: ${multiplier.toFixed(2)}x`;
            multEl.style.color = "#38bdf8";
            dinoCont.style.transition = "bottom 1.5s ease-in";
            dinoCont.style.bottom = "800px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            actionBtn.innerText = "دووبارە هەوڵبدە";
            actionBtn.classList.remove('cashout');

            if (isCrash) {
                const rect = dinoCont.getBoundingClientRect();
                const screenRect = screen.getBoundingClientRect();
                explode(rect.left - screenRect.left + 25, rect.top - screenRect.top + 30);
                
                statusEl.innerText = "💥 شكه‌ست! هێكا دیناسۆری شكه‌ست.";
                multEl.style.color = "#ef4444";
                dinoBody.style.display = 'none';
                eggShell.style.display = 'block'; // نیشاندانا هێكا شكه‌ستی
            }
        }
    </script>
</body>
</html>
