<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Hunter UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Vazirmatn:wght@300;700&display=swap');

        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: #f8fafc;
            font-family: 'Vazirmatn', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Dashboard Card */
        .card {
            width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, var(--border), transparent);
            border-radius: 32px;
            z-index: -1;
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'JetBrains Mono'; font-size: 18px; display: block; margin-top: 5px; color: var(--primary); }

        /* Terminal Window */
        .terminal-wrap {
            background: #000;
            border-radius: 16px;
            padding: 15px;
            height: 180px;
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .terminal-content {
            font-family: 'JetBrains Mono';
            font-size: 11px;
            color: var(--accent);
            line-height: 1.6;
            height: 100%;
            overflow-y: auto;
        }

        /* Crypto Grid */
        .coin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .coin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .coin-card:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .coin-card img {
            width: 35px;
            height: 35px;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
            margin-bottom: 10px;
        }

        /* Styled Checkbox */
        .checkbox-custom {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Action Button */
        .btn-action {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
            transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="card">
    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">Checked</span>
            <span class="stat-value" id="count-checked">1,240</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Found</span>
            <span class="stat-value" style="color: #f43f5e;">0</span>
        </div>
    </div>

    <div class="terminal-wrap">
        <div class="terminal-content" id="log">
            > System initialized...<br>
            > Waiting for start command...
        </div>
    </div>

    <div class="coin-grid">
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" alt="BTC">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg" alt="ETH">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/solana-sol-logo.svg" alt="SOL">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.svg" alt="BNB">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" alt="TON">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
        <div class="coin-card">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.svg" alt="USDT">
            <input type="checkbox" class="checkbox-custom" checked>
        </div>
    </div>

    <button class="btn-action" onclick="simulate()">INITIALIZE SCAN</button>
</div>

<script>
    function simulate() {
        const log = document.getElementById('log');
        const count = document.getElementById('count-checked');
        let i = 1240;

        setInterval(() => {
            i += Math.floor(Math.random() * 5);
            count.innerText = i.toLocaleString();
            
            const hash = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            const line = document.createElement('div');
            line.innerHTML = `> <span style="color:#6366f1">Check:</span> ${hash.substring(0,24)}... <span style="color:#f43f5e">[EMPTY]</span>`;
            log.appendChild(line);
            
            if(log.childNodes.length > 20) log.removeChild(log.firstChild);
            log.scrollTop = log.scrollHeight;
        }, 80);
    }
</script>

</body>
</html>
