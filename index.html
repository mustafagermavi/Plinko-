<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Pixel Galaxy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050510;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-blue: #00d2ff;
            --neon-yellow: #fefe33;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
        }

        /* پاشبنەمای ئەستێرە جوڵاوەکان */
        #bgCanvas {
            position: fixed; top: 0; left: 0;
            z-index: -1; width: 100%; height: 100%;
        }

        .container {
            position: relative; z-index: 1;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            height: 100vh; justify-content: space-around;
        }

        /* Bento Pixel Cards */
        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 4px solid #1e293b;
            box-shadow: 6px 6px 0px #000;
            padding: 15px; width: 90%; max-width: 350px;
            text-align: center; backdrop-filter: blur(5px);
        }

        .price-display {
            font-size: 20px; color: var(--neon-yellow);
            text-shadow: 2px 2px #ff00ff; margin-bottom: 10px;
        }

        #gameCanvas {
            width: 100%; height: 150px;
            background: #000; border: 2px solid var(--neon-blue);
            image-rendering: pixelated;
        }

        .controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 350px;
        }

        input {
            grid-column: span 2; background: #000; border: 3px solid var(--neon-blue);
            padding: 15px; color: var(--neon-green); font-family: 'Press Start 2P';
            font-size: 14px; text-align: center; outline: none;
        }

        .btn {
            padding: 20px 10px; border: 4px solid; font-size: 12px;
            font-family: 'Press Start 2P'; color: white; cursor: pointer;
            transition: 0.1s;
        }
        .up { background: #064e3b; border-color: var(--neon-green); }
        .down { background: #7f1d1d; border-color: var(--neon-red); }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        .header-info {
            width: 100%; display: flex; justify-content: space-between;
            font-size: 10px; color: var(--neon-blue); padding: 0 10px;
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="scanlines"></div>

<div class="container">
    <div class="header-info">
        <span>CREDITS: <span id="balance">1000</span></span>
        <span>TON LIVE</span>
    </div>

    <div class="card">
        <div class="price-display">$<span id="price">5.4200</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="betAmount" value="100">
        <button class="btn up" onclick="play('up')">UP</button>
        <button class="btn down" onclick="play('down')">DOWN</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // پاشبنەمای ئەستێرەکان
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let stars = [];

    function initStars() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * bgCanvas.width,
                y: Math.random() * bgCanvas.height,
                size: Math.random() * 3,
                speed: Math.random() * 0.5 + 0.1
            });
        }
    }

    function drawStars() {
        bgCtx.fillStyle = '#050510';
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.fillStyle = '#ffffff';
        stars.forEach(s => {
            bgCtx.fillRect(s.x, s.y, s.size, s.size);
            s.y += s.speed;
            if(s.y > bgCanvas.height) s.y = 0;
        });
        requestAnimationFrame(drawStars);
    }

    // لۆجیکی یاری
    let balance = 1000;
    let currentPrice = 5.4200;
    let prices = Array(40).fill(5.4200);
    const gCanvas = document.getElementById('gameCanvas');
    const gCtx = gCanvas.getContext('2d');
    gCanvas.width = 300; gCanvas.height = 150;

    function updateGame() {
        currentPrice += (Math.random() - 0.5) * 0.01;
        prices.push(currentPrice);
        prices.shift();
        document.getElementById('price').innerText = currentPrice.toFixed(4);
        
        gCtx.fillStyle = '#000';
        gCtx.fillRect(0, 0, gCanvas.width, gCanvas.height);
        gCtx.strokeStyle = '#00d2ff';
        gCtx.lineWidth = 4;
        gCtx.beginPath();
        
        let min = Math.min(...prices) - 0.01;
        let max = Math.max(...prices) + 0.01;

        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * gCanvas.width;
            let y = gCanvas.height - ((p - min) / (max - min)) * gCanvas.height;
            if(i === 0) gCtx.moveTo(x, y); else gCtx.lineTo(x, y);
        });
        gCtx.stroke();
    }

    function play(type) {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(amt > balance) { tg.showAlert("No Credits!"); return; }
        
        balance -= amt;
        document.getElementById('balance').innerText = balance;
        tg.HapticFeedback.impactOccurred('medium');
        
        let startP = currentPrice;
        setTimeout(() => {
            let win = (type === 'up' && currentPrice > startP) || (type === 'down' && currentPrice < startP);
            if(win) {
                balance += Math.floor(amt * 1.9);
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert("WINNER! +"+Math.floor(amt*0.9));
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
            document.getElementById('balance').innerText = balance;
        }, 3000);
    }

    initStars();
    drawStars();
    setInterval(updateGame, 150);
    window.onresize = initStars;
</script>

</body>
</html>
