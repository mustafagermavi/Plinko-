<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Neumorphic Terminal | Real-time Wallet Scanner</title>
    <!-- Google Fonts: monospace + clean UI -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:opsz,wght@14..32,400;14..32,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e2124;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
        }

        /* main container – subtle neumorphic wrapper */
        .terminal-container {
            max-width: 800px;
            width: 100%;
            background: #1e2124;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: -10px -10px 20px rgba(0, 0, 0, 0.5),
                        10px 10px 20px rgba(255, 255, 255, 0.05);
        }

        /* header with label */
        .terminal-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            gap: 0.75rem;
        }
        .title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 500;
            color: #cbd5e6;
            letter-spacing: 0.3px;
        }
        .title i {
            font-size: 1.3rem;
            color: #6c8eff;
        }
        .badge {
            background: #2a2e33;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #9aa9c4;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3), inset -1px -1px 1px rgba(255,255,255,0.02);
        }

        /* INSET NEUMORPHIC TERMINAL BOX (carved in effect) */
        .terminal-inset {
            background: #1e2124;
            border-radius: 28px;
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.6),
                        inset -6px -6px 12px rgba(255, 255, 255, 0.04);
            padding: 1.2rem 1rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        /* scrollable log area */
        .terminal-log {
            flex: 1;
            overflow-y: auto;
            max-height: 340px;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        /* each log line – monospace, subtle grey */
        .log-line {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 0.3rem 0.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: #b0bedb;  /* subtle grey-blue */
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* highlight FAIL and SUCCESS */
        .log-line .highlight-fail {
            color: #ff7b72;
            font-weight: 600;
            text-shadow: 0 0 2px rgba(255,80,80,0.2);
            background: rgba(255,70,70,0.08);
            padding: 0 2px;
            border-radius: 6px;
        }
        .log-line .highlight-success {
            color: #7ee787;
            font-weight: 600;
            text-shadow: 0 0 2px rgba(100,255,100,0.2);
            background: rgba(70,255,70,0.05);
            padding: 0 2px;
            border-radius: 6px;
        }

        /* custom scrollbar – minimal */
        .terminal-log::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-log::-webkit-scrollbar-track {
            background: #2a2e33;
            border-radius: 8px;
        }
        .terminal-log::-webkit-scrollbar-thumb {
            background: #5c6a82;
            border-radius: 8px;
        }

        /* button row – neumorphic buttons */
        .button-group {
            display: flex;
            gap: 1.2rem;
            margin-top: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .neo-btn {
            background: #1e2124;
            border: none;
            padding: 0.75rem 1.6rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #dce5f5;
            cursor: pointer;
            transition: all 0.12s ease;
            box-shadow: -5px -5px 12px rgba(0, 0, 0, 0.5),
                        5px 5px 12px rgba(255, 255, 255, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .neo-btn:active {
            transform: scale(0.97);
            box-shadow: -2px -2px 6px rgba(0, 0, 0, 0.6),
                        2px 2px 6px rgba(255, 255, 255, 0.03);
        }
        .neo-btn.stop-btn {
            color: #ffa28b;
        }
        .status-indicator {
            font-size: 0.7rem;
            background: #2a2e33;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            color: #a6c1ff;
            font-family: monospace;
        }
        @media (max-width: 550px) {
            .terminal-container { padding: 1rem; }
            .terminal-inset { padding: 0.9rem; }
            .log-line { font-size: 0.7rem; }
            .neo-btn { padding: 0.6rem 1.2rem; font-size: 0.75rem; }
        }
    </style>
    <!-- Font Awesome for icons (optional but nice) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="terminal-container">
    <div class="terminal-header">
        <div class="title">
            <i class="fas fa-terminal"></i>
            <span>REALTIME WALLET SCANNER</span>
        </div>
        <div class="badge">
            <i class="fas fa-microchip"></i> BIP39 · 80-100ms
        </div>
    </div>

    <!-- Inset Neumorphic Terminal Box (carved effect) -->
    <div class="terminal-inset">
        <div class="terminal-log" id="terminalLog">
            <!-- initial messages, will be overwritten after start -->
            <div class="log-line">[system] terminal ready — press START</div>
            <div class="log-line">[info] real‑time wallet entropy scan</div>
            <div class="log-line">[ready] max 15 lines, auto‑scroll enabled</div>
        </div>
    </div>

    <div class="button-group">
        <button class="neo-btn" id="startBtn"><i class="fas fa-play"></i> START SCAN</button>
        <button class="neo-btn stop-btn" id="stopBtn"><i class="fas fa-stop"></i> STOP & CLEAR</button>
    </div>
    <div style="text-align: center; margin-top: 0.8rem;">
        <span class="status-indicator" id="liveStatus">⚫ INACTIVE</span>
    </div>
</div>

<script>
    // ----------------------------------------------
    // 1. BIP39 wordlist (subset of 200 common words)
    // ----------------------------------------------
    const BIP39_SUBSET = [
        "abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract", "absurd", "abuse",
        "access", "accident", "account", "accuse", "achieve", "acid", "acoustic", "acquire", "across", "act",
        "action", "actor", "actress", "actual", "adapt", "add", "addict", "address", "adjust", "admit",
        "adult", "advance", "advice", "aerobic", "affair", "afford", "afraid", "africa", "after", "again",
        "age", "agent", "agree", "ahead", "aim", "air", "airport", "aisle", "alarm", "album", "alcohol",
        "alert", "alien", "all", "alley", "allow", "almost", "alone", "alpha", "already", "also",
        "alter", "always", "amateur", "amazing", "among", "amount", "amused", "analyst", "anchor", "ancient",
        "anger", "angle", "angry", "animal", "ankle", "announce", "annual", "another", "answer", "antenna",
        "antique", "anxiety", "any", "apart", "apology", "appear", "apple", "approve", "april", "arch",
        "arctic", "area", "arena", "argue", "arm", "armed", "armor", "army", "around", "arrange",
        "arrest", "arrive", "arrow", "art", "artefact", "artist", "artwork", "ask", "aspect", "assault",
        "asset", "assist", "assume", "asthma", "athlete", "atom", "attack", "attend", "attitude", "attract",
        "auction", "audit", "august", "aunt", "author", "auto", "autumn", "average", "avocado", "avoid",
        "awake", "aware", "away", "awesome", "awful", "awkward", "axis", "baby", "bachelor", "bacon",
        "badge", "bag", "balance", "balcony", "ball", "bamboo", "banana", "banner", "bar", "barely",
        "bargain", "barrel", "base", "basic", "basket", "battle", "beach", "bean", "beauty", "because",
        "become", "beef", "before", "begin", "behave", "behind", "believe", "below", "belt", "bench",
        "benefit", "best", "betray", "better", "between", "beyond", "bicycle", "bid", "bike", "bind"
    ];  // enough to simulate randomness

    // helper: get N random BIP39 words (12 words for mnemonic)
    function getRandomMnemonic(wordCount = 12) {
        const shuffled = [...BIP39_SUBSET];
        // Fisher-Yates not needed, just pick random indices
        const words = [];
        for (let i = 0; i < wordCount; i++) {
            const randomIndex = Math.floor(Math.random() * BIP39_SUBSET.length);
            words.push(BIP39_SUBSET[randomIndex]);
        }
        return words.join(' ');
    }

    // simulate "Wallet Check: [12 random BIP39 words]... [FAIL/SUCCESS]"
    // we will append lines with probability 20% SUCCESS, 80% FAIL
    function generateScanLine() {
        const mnemonic = getRandomMnemonic(12);
        const isSuccess = Math.random() < 0.2;  // 20% success rate (realistic detection)
        const statusText = isSuccess ? "SUCCESS" : "FAIL";
        // Format: Wallet Check: word1 word2 ... word12 ... [FAIL] or [SUCCESS]
        // use a concise preview
        return `🔍 Wallet Check: ${mnemonic}... → [${statusText}]`;
    }

    // ---- Terminal Manager ----
    const terminalLogDiv = document.getElementById('terminalLog');
    let intervalId = null;
    let isActive = false;
    const MAX_LINES = 15;
    let lineBuffer = []; // store lines as DOM elements? we'll manage by appending/trimming

    // helper: add a single line to the terminal, respecting max lines & auto-scroll
    function appendLine(text, isSuccessStatus = null) {
        // create log line element
        const lineDiv = document.createElement('div');
        lineDiv.className = 'log-line';
        
        // we need to detect if the line contains "SUCCESS" or "FAIL" to apply highlight
        // but the generated line includes [SUCCESS] or [FAIL] in brackets.
        // we'll wrap those parts with spans.
        let formattedHtml = '';
        // parse text to highlight FAIL/SUCCESS tokens (case sensitive, but they are uppercase)
        // we can split using regex
        const parts = text.split(/(\[SUCCESS\]|\[FAIL\])/g);
        for (let part of parts) {
            if (part === '[SUCCESS]') {
                formattedHtml += `<span class="highlight-success">${part}</span>`;
            } else if (part === '[FAIL]') {
                formattedHtml += `<span class="highlight-fail">${part}</span>`;
            } else {
                formattedHtml += part;
            }
        }
        lineDiv.innerHTML = formattedHtml;
        
        terminalLogDiv.appendChild(lineDiv);
        
        // enforce max lines: if more than MAX_LINES, remove first child
        while (terminalLogDiv.children.length > MAX_LINES) {
            terminalLogDiv.removeChild(terminalLogDiv.firstChild);
        }
        
        // auto-scroll to bottom
        terminalLogDiv.scrollTop = terminalLogDiv.scrollHeight;
    }

    // clear terminal completely (optional but used for stop+clear)
    function clearTerminal() {
        terminalLogDiv.innerHTML = '';
        // add a fresh placeholder message
        const placeholder = document.createElement('div');
        placeholder.className = 'log-line';
        placeholder.innerHTML = '⏻ terminal cleared — press START to begin scanning';
        terminalLogDiv.appendChild(placeholder);
    }

    // core scanning tick: generates a new line every 80-100ms
    let lastIntervalDelay = 85; // variable, but we set dynamic on each tick? simpler: we set interval once with fixed but dynamic within range? 
    // To achieve random interval between 80-100ms, we can use setTimeout chain, or set interval with clear and reset.
    // Better: use recursive setTimeout with random delay to simulate "80-100ms" more accurately.
    function startSimulation() {
        if (isActive) return; // already running
        
        isActive = true;
        updateStatusUI(true);
        // clear any existing interval leftover
        if (intervalId) clearTimeout(intervalId);
        
        function scheduleTick() {
            if (!isActive) return;
            // generate and append new scan line
            const lineText = generateScanLine();
            appendLine(lineText);
            // random delay between 80 and 100 milliseconds
            const nextDelay = Math.floor(Math.random() * (100 - 80 + 1) + 80);
            intervalId = setTimeout(scheduleTick, nextDelay);
        }
        
        // start first tick immediately
        scheduleTick();
    }
    
    function stopAndClear() {
        if (intervalId) {
            clearTimeout(intervalId);
            intervalId = null;
        }
        isActive = false;
        updateStatusUI(false);
        clearTerminal();
        // also maybe add a line to indicate stopped
        const stopMsg = document.createElement('div');
        stopMsg.className = 'log-line';
        stopMsg.innerHTML = '⛔ scan halted — all data cleared';
        terminalLogDiv.appendChild(stopMsg);
        while (terminalLogDiv.children.length > MAX_LINES) {
            terminalLogDiv.removeChild(terminalLogDiv.firstChild);
        }
        terminalLogDiv.scrollTop = terminalLogDiv.scrollHeight;
    }
    
    // update the status badge
    const statusSpan = document.getElementById('liveStatus');
    function updateStatusUI(running) {
        if (running) {
            statusSpan.innerHTML = '<i class="fas fa-circle" style="color:#7ee787; font-size:0.7rem;"></i> LIVE · SCANNING';
            statusSpan.style.color = '#b5e4a0';
        } else {
            statusSpan.innerHTML = '⚫ IDLE · stopped';
            statusSpan.style.color = '#9aa3b3';
        }
    }
    
    // button handlers
    document.getElementById('startBtn').addEventListener('click', () => {
        if (isActive) {
            // if already active, do nothing (or we can show a soft warning but not necessary)
            // optional: add a temporary message but not required.
            const warnLine = document.createElement('div');
            warnLine.className = 'log-line';
            warnLine.innerHTML = '⚠️ scan already running — stop first if needed';
            terminalLogDiv.appendChild(warnLine);
            while (terminalLogDiv.children.length > MAX_LINES) terminalLogDiv.removeChild(terminalLogDiv.firstChild);
            terminalLogDiv.scrollTop = terminalLogDiv.scrollHeight;
            return;
        }
        // if terminal is cleared or contains placeholder, remove placeholder / reset for fresh start
        if (terminalLogDiv.children.length === 1 && terminalLogDiv.children[0].innerText.includes('cleared')) {
            terminalLogDiv.innerHTML = '';
        }
        startSimulation();
    });
    
    document.getElementById('stopBtn').addEventListener('click', () => {
        stopAndClear();
    });
    
    // initial state: not running, but we display some initial guide
    // make sure terminal shows minimal lines
    if (terminalLogDiv.children.length === 0) {
        clearTerminal();
    } else {
        // ensure not overflow
        while (terminalLogDiv.children.length > MAX_LINES) terminalLogDiv.removeChild(terminalLogDiv.firstChild);
    }
    
    // optional: add a welcome line with formatting example
    const exampleLine = document.createElement('div');
    exampleLine.className = 'log-line';
    exampleLine.innerHTML = `✨ demo: <span class="highlight-success">SUCCESS</span> and <span class="highlight-fail">FAIL</span> highlighting active — interval 80‑100ms`;
    terminalLogDiv.appendChild(exampleLine);
    while (terminalLogDiv.children.length > MAX_LINES) terminalLogDiv.removeChild(terminalLogDiv.firstChild);
    terminalLogDiv.scrollTop = terminalLogDiv.scrollHeight;
</script>
</body>
</html>
