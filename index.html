<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel TON Trade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e;
            --pixel-green: #00ff41;
            --pixel-red: #ff3e3e;
            --pixel-yellow: #ffff00;
            --pixel-blue: #00d2ff;
        }
        body {
            margin: 0; padding: 15px;
            background-color: var(--bg);
            color: white;
            font-family: 'Press Start 2P', cursive; /* فۆنتی پیکسڵ */
            display: flex; flex-direction: column; align-items: center;
            line-height: 1.6;
        }
        .container { width: 100%; max-width: 400px; }
        
        /* Bento Pixel Card */
        .card { 
            background: #16213e; 
            border: 4px solid #0f3460; 
            box-shadow: 6px 6px 0px #000;
            padding: 15px; text-align: center; margin-bottom: 20px;
        }
        
        .price-text { font-size: 18px; color: var(--pixel-yellow); margin-bottom: 10px; }
        canvas { 
            width: 100%; height: 140px; 
            background: #0f172a; border: 2px solid #533483;
            image-rendering: pixelated; /* گرنگ بۆ ستایلی پیکسڵ */
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input {
            grid-column: span 2; background: #000; border: 3px solid #533483;
            padding: 12px; color: var(--pixel-green); font-family: 'Press Start 2P';
            font-size: 14px; text-align: center; margin-bottom: 10px; outline: none;
        }

        .btn { 
            padding: 15px 5px; border: 4px solid; font-size: 10px; 
            font-family: 'Press Start 2P'; font-weight: bold; color: white; 
            cursor: pointer; position: relative;
        }
        /* ستایلی دوگمەی پیکسڵ */
        .up { background: #008000; border-color: #00ff00 #004d00 #004d00 #00ff00; }
        .down { background: #800000; border-color: #ff0000 #4d0000 #4d0000 #ff0000; }
        .btn:active { top: 3px; box-shadow: none; }

        .balance-info { font-size: 10px; color: var(--pixel-blue); margin-bottom: 15px; }
        
        /* مێژووی پیکسڵ */
        .history-item {
            font-size: 8px; background: #0f3460; padding: 8px;
            margin-top: 8px; border: 2px solid #533483;
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="balance-info">CREDITS: <span id="balance">1000</span></div>

    <div class="card">
        <div class="price-text">$<span id="price">5.420</span></div>
        <canvas id="pixelChart"></canvas>
    </div>

    <div class="controls">
        <input type="number" id="betAmount" value="50">
        <button class="btn up" id="upBtn" onclick="bet('up')">BUY ▲</button>
        <button class="btn down" id="downBtn" onclick="bet('down')">SELL ▼</button>
    </div>

    <div id="history" style="margin-top: 20px; width: 100%;">
        <div style="font-size: 10px; color: #848e9c;">LAST LOGS:</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = 1000;
    let currentPrice = 5.420;
    let prices = Array(30).fill(5.420);
    let isWaiting = false;

    const canvas = document.getElementById('pixelChart');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 150;

    function update() {
        let diff = (Math.random() - 0.5) * 0.015;
        currentPrice = parseFloat((currentPrice + diff).toFixed(3));
        prices.push(currentPrice);
        prices.shift();
        document.getElementById('price').innerText = currentPrice.toFixed(3);
        draw();
    }

    function draw() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // کێشانی هێڵی پیکسڵ
        ctx.strokeStyle = isWaiting ? "#ffff00" : "#00ff41";
        ctx.lineWidth = 4;
        ctx.beginPath();
        
        const min = Math.min(...prices) - 0.01;
        const max = Math.max(...prices) + 0.01;

        prices.forEach((p, i) => {
            let x = (i / (prices.length - 1)) * canvas.width;
            let y = canvas.height - ((p - min) / (max - min)) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // کێشانی کارەکتەری پیکسڵ لە کۆتایی هێڵەکە
        let lastY = canvas.height - ((currentPrice - min) / (max - min)) * canvas.height;
        ctx.fillStyle = "#ffff00";
        ctx.fillRect(canvas.width - 10, lastY - 5, 8, 8); // کارەکتەرەکە وەک بلۆکێکی زەرد
    }

    function bet(type) {
        let amt = parseInt(document.getElementById('betAmount').value);
        if(amt > balance || isWaiting) return;

        isWaiting = true;
        balance -= amt;
        document.getElementById('balance').innerText = balance;
        let startP = currentPrice;
        
        tg.HapticFeedback.impactOccurred('rigid');

        setTimeout(() => {
            let win = (type === 'up' && currentPrice > startP) || (type === 'down' && currentPrice < startP);
            if(win) {
                balance += Math.floor(amt * 1.9);
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('error');
            }
            
            // زیادکردن بۆ مێژوو
            const log = document.createElement('div');
            log.className = "history-item";
            log.style.color = win ? "var(--pixel-green)" : "var(--pixel-red)";
            log.innerHTML = `<span>${type.toUpperCase()} ${amt}</span> <span>${win ? 'WIN' : 'LOSE'}</span>`;
            document.getElementById('history').prepend(log);

            document.getElementById('balance').innerText = balance;
            isWaiting = false;
        }, 4000);
    }

    setInterval(update, 200);
</script>

</body>
</html>
