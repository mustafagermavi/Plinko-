<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Predictor Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #080a0c;
            --card: #12161a;
            --accent: #00d2ff;
            --green: #0ecb81;
            --red: #f6465d;
            --text: #ffffff;
            --subtext: #848e9c;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 15px;
            user-select: none;
        }

        /* Bento Grid Layout */
        .bento-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 12px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        /* بەشی نرخ و گراف - Full Width */
        .hero-card {
            grid-column: span 2;
            text-align: center;
        }

        .price-text {
            font-size: 36px;
            font-weight: 800;
            font-family: monospace;
            color: #f0b90b;
            margin: 10px 0;
        }

        canvas {
            width: 100%;
            height: 140px;
            margin-top: 10px;
        }

        /* بەشی کۆنتڕۆڵ و کات */
        .stat-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .timer-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        /* دوگمەکان */
        .action-card {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-up { background: var(--green); box-shadow: 0 4px 15px rgba(14, 203, 129, 0.2); }
        .btn-down { background: var(--red); box-shadow: 0 4px 15px rgba(246, 70, 93, 0.2); }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; }

        /* Leaderboard Section */
        .leaderboard-card {
            grid-column: span 2;
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }

        .leader-name { color: var(--subtext); }
        .leader-score { color: var(--accent); font-weight: bold; }

        .user-tag {
            font-size: 12px;
            color: var(--accent);
            background: rgba(0, 210, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <span class="user-tag" id="userName">User: Guest</span>
    </div>

    <div class="bento-container">
        <div class="card hero-card">
            <div style="font-size: 14px; color: var(--subtext);">TON/USDT Live</div>
            <div class="price-text" id="price">5.4200</div>
            <canvas id="liveChart"></canvas>
        </div>

        <div class="card stat-card">
            <div class="timer-circle" id="timer">5</div>
            <div style="font-size: 11px; margin-top: 8px; color: var(--subtext);">چرکە بۆ دەرەنجام</div>
        </div>

        <div class="card stat-card">
            <div style="font-size: 20px; font-weight: bold; color: #f0b90b;">1,250</div>
            <div style="font-size: 11px; color: var(--subtext);">خاڵەکانی تۆ</div>
        </div>

        <div class="action-card">
            <button class="btn-up" id="upBtn" onclick="startPrediction('up')">UP ▲</button>
            <button class="btn-down" id="downBtn" onclick="startPrediction('down')">DOWN ▼</button>
        </div>

        <div class="card leaderboard-card">
            <div style="font-size: 15px; font-weight: bold; margin-bottom: 10px;">🏆 باشترینەکانی ئەمڕۆ</div>
            <div id="leaderboardList">
                <div class="leader-item"><span class="leader-name">1. Mustafa (You)</span><span class="leader-score">1250 PT</span></div>
                <div class="leader-item"><span class="leader-name">2. Ahmed</span><span class="leader-score">1120 PT</span></div>
                <div class="leader-item"><span class="leader-name">3. Karwan</span><span class="leader-score">980 PT</span></div>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp Setup
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if(tg.initDataUnsafe?.user) {
            document.getElementById('userName').innerText = "User: " + tg.initDataUnsafe.user.first_name;
        }

        // Logic ی یارییەکە
        const canvas = document.getElementById('liveChart');
        const ctx = canvas.getContext('2d');
        let prices = Array(40).fill(5.4200);
        let currentPrice = 5.4200;
        let isPlaying = false;
        let entryPrice = 0;

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        function updatePrice() {
            let change = (Math.random() - 0.5) * 0.006;
            currentPrice = parseFloat((currentPrice + change).toFixed(4));
            prices.push(currentPrice);
            prices.shift();
            
            document.getElementById('price').innerText = currentPrice.toFixed(4);
            drawChart();
        }

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = isPlaying ? (currentPrice >= entryPrice ? "#0ecb81" : "#f6465d") : "#00d2ff";
            
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            
            prices.forEach((p, i) => {
                let x = (i / (prices.length - 1)) * canvas.width;
                let y = canvas.height - ((p - min) / (max - min)) * canvas.height;
                if(i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function startPrediction(type) {
            if(isPlaying) return;
            isPlaying = true;
            entryPrice = currentPrice;
            document.getElementById('upBtn').disabled = true;
            document.getElementById('downBtn').disabled = true;

            let count = 5;
            let timer = setInterval(() => {
                count--;
                document.getElementById('timer').innerText = count;
                if(count <= 0) {
                    clearInterval(timer);
                    checkResult(type);
                }
            }, 1000);
        }

        function checkResult(type) {
            let win = (type === 'up' && currentPrice > entryPrice) || (type === 'down' && currentPrice < entryPrice);
            tg.HapticFeedback.notificationOccurred(win ? 'success' : 'error');
            
            alert(win ? "پیرۆزە! بردتەوە 🎉" : "بەداخەوە! دۆڕاندت ❌");

            isPlaying = false;
            document.getElementById('timer').innerText = "5";
            document.getElementById('upBtn').disabled = false;
            document.getElementById('downBtn').disabled = false;
        }

        setInterval(updatePrice, 150);
    </script>
</body>
</html>
