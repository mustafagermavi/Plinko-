<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Predictor</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0e11;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .chart-container {
            width: 90%;
            height: 200px;
            background: #161a1e;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid #2b3139;
        }
        .price-display {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            color: #f0b90b; /* ڕەنگی زەردی کریپتۆ */
        }
        .buttons {
            display: flex;
            gap: 20px;
            width: 90%;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .up-btn { background-color: #0ecb81; color: white; }
        .down-btn { background-color: #f6465d; color: white; }
        .up-btn:disabled, .down-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .timer { margin-top: 15px; font-size: 14px; color: #848e9c; }
        .result { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="price-display">$<span id="price">5.420</span></div>
    
    <div class="chart-container">
        <canvas id="miniChart" width="350" height="200"></canvas>
    </div>

    <div class="timer">کات بۆ ئەنجام: <span id="countdown">5</span> چرکە</div>

    <div class="buttons">
        <button class="up-btn" onclick="makeBet('up')">بەرزبوونەوە (UP)</button>
        <button class="down-btn" onclick="makeBet('down')">نزمبوونەوە (DOWN)</button>
    </div>

    <div id="result" class="result"></div>

    <script>
        let currentPrice = 5.420;
        let isWaiting = false;
        let userBet = null;
        let startPrice = 0;

        function updatePrice() {
            let change = (Math.random() - 0.5) * 0.02;
            currentPrice = parseFloat((currentPrice + change).toFixed(3));
            document.getElementById('price').innerText = currentPrice;
            
            // ئەگەر یاریزان گرەوی کردبێت، ڕەنگی نرخەکە بگۆڕە
            if(isWaiting) {
                document.getElementById('price').style.color = currentPrice >= startPrice ? "#0ecb81" : "#f6465d";
            } else {
                document.getElementById('price').style.color = "#f0b90b";
            }
        }

        setInterval(updatePrice, 1000);

        function makeBet(side) {
            if(isWaiting) return;
            
            userBet = side;
            startPrice = currentPrice;
            isWaiting = true;
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            document.getElementById('result').innerText = "چاوەڕێی ئەنجام بە...";

            let timeLeft = 5;
            let timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkResult();
                }
            }, 1000);
        }

        function checkResult() {
            let finalPrice = currentPrice;
            let win = false;

            if(userBet === 'up' && finalPrice > startPrice) win = true;
            if(userBet === 'down' && finalPrice < startPrice) win = true;

            const resultDiv = document.getElementById('result');
            if(win) {
                resultDiv.innerText = "پیرۆزە! تۆ بردتەوە 🎉";
                resultDiv.style.color = "#0ecb81";
            } else {
                resultDiv.innerText = "بەداخەوە! دۆڕاندت ❌";
                resultDiv.style.color = "#f6465d";
            }

            // گەڕانەوە بۆ دۆخی ئاسایی
            setTimeout(() => {
                isWaiting = false;
                userBet = null;
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                document.getElementById('countdown').innerText = "5";
                resultDiv.innerText = "";
            }, 3000);
        }
    </script>
</body>
</html>
