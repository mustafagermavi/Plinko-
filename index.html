<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BTC BruteForce | Crypto Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0f1c, #020408);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', 'Courier New', monospace;
      padding: 16px;
    }

    /* main hacker card */
    .scanner-dashboard {
      max-width: 360px;
      width: 100%;
      background: rgba(8, 14, 22, 0.96);
      backdrop-filter: blur(3px);
      border-radius: 48px;
      padding: 22px 18px 28px;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.85), 0 0 0 1px rgba(0, 255, 200, 0.2), 0 0 12px rgba(0, 255, 200, 0.3);
      transition: all 0.2s;
      border: 1px solid rgba(0, 255, 200, 0.35);
    }

    /* header */
    .glitch-header h1 {
      font-size: 1.65rem;
      font-weight: 800;
      background: linear-gradient(125deg, #00f5d4, #7effb0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 6px #0affb0;
      margin-bottom: 4px;
    }

    .badge {
      font-size: 0.65rem;
      color: #6c8fb0;
      border-left: 2px solid #2effb0;
      padding-left: 8px;
      margin-top: -2px;
    }

    /* counters row */
    .stats-row {
      display: flex;
      justify-content: space-between;
      background: #00000055;
      border-radius: 60px;
      padding: 8px 18px;
      margin: 18px 0 14px 0;
      border: 1px solid #1f4552;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #94b7d0;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 800;
      font-family: monospace;
      color: #1effbc;
      text-shadow: 0 0 5px #00cca3;
      line-height: 1;
    }

    /* terminal */
    .terminal-box {
      background: #03090e;
      border-radius: 28px;
      padding: 12px 10px;
      height: 210px;
      overflow-y: auto;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.7rem;
      border: 1px solid #2b5b66;
      box-shadow: inset 0 0 12px #00000044, 0 6px 12px rgba(0, 0, 0, 0.4);
      margin: 12px 0 12px 0;
    }

    .terminal-line {
      color: #aaffdd;
      padding: 5px 6px;
      border-left: 2px solid #2effb0;
      margin-bottom: 5px;
      background: #0b1422a0;
      font-weight: 500;
      word-break: break-word;
    }

    .terminal-box::-webkit-scrollbar {
      width: 4px;
    }
    .terminal-box::-webkit-scrollbar-track {
      background: #0a1a24;
      border-radius: 8px;
    }
    .terminal-box::-webkit-scrollbar-thumb {
      background: #1affb2;
      border-radius: 8px;
    }

    /* found row */
    .found-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      background: #0a121caa;
      border-radius: 40px;
      padding: 6px 20px;
      margin: 8px 0 12px 0;
    }

    .found-label {
      font-size: 1rem;
      font-weight: bold;
      color: #ffb347;
    }

    .found-count {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: monospace;
      color: #ffae42;
      text-shadow: 0 0 4px #ff8c00;
    }

    /* RESULT PANEL with icon + text (dynamic) */
    .result-panel {
      background: #1c262f;
      border-radius: 28px;
      padding: 12px 16px;
      margin: 8px 0 20px 0;
      border: 1px solid #3e606b;
      box-shadow: inset 0 1px 2px #00000033, 0 6px 10px rgba(0, 0, 0, 0.3);
      min-height: 80px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s;
    }

    .result-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 2px black;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 200, 0.5);
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 245, 0.2), rgba(0, 0, 0, 0.3));
      flex-shrink: 0;
    }

    .result-text {
      font-family: monospace;
      font-weight: bold;
      font-size: 0.85rem;
      color: #e0eef7;
      word-break: break-word;
      line-height: 1.35;
    }

    .placeholder-text {
      color: #7e95aa;
      font-style: italic;
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    /* 3x3 crypto grid */
    .crypto-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 10px;
      justify-items: center;
      margin: 16px 0 22px;
    }

    .coin-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .coin-circle {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 3px black;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 230, 210, 0.4);
      transition: transform 0.2s ease;
    }

    .coin-circle:hover {
      transform: scale(1.02);
    }

    .blue-check {
      margin-top: 6px;
      font-size: 18px;
      font-weight: bold;
      color: #3c9eff;
      background: #0f1c24;
      width: 28px;
      height: 28px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 2px cyan;
    }

    /* buttons */
    .button-row {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 12px 0;
      font-weight: 800;
      font-size: 1.2rem;
      border: none;
      border-radius: 60px;
      font-family: monospace;
      letter-spacing: 1px;
      transition: 0.1s linear;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
    }

    .start {
      background: #0f6e3a;
      border-bottom: 3px solid #3effa0;
      color: #e6ffee;
    }

    .start:active {
      transform: scale(0.96);
      background: #0b552e;
    }

    .stop {
      background: #722b2b;
      border-bottom: 3px solid #ff7676;
      color: #ffe0e0;
    }

    .stop:active {
      transform: scale(0.96);
      background: #571f1f;
    }

    .action-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
<div class="scanner-dashboard">
  <div class="glitch-header">
    <h1>Crypto Wallet BruteForce</h1>
    <div class="badge">// ACTIVE DEEP SCAN v3.1</div>
  </div>

  <!-- Checked counter row -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">CHECKED</div>
      <div class="stat-value" id="checkedCounter">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">SCAN MODE</div>
      <div class="stat-value" style="font-size:1rem; color:#6effb0;">● READY</div>
    </div>
  </div>

  <!-- Terminal console -->
  <div class="terminal-box" id="terminalConsole">
    <div class="terminal-line">> wallet_bruteforce_engine loaded</div>
    <div class="terminal-line">> idle — press [START] to begin</div>
  </div>

  <!-- Found counter row -->
  <div class="found-wrapper">
    <span class="found-label">🔓 FOUND WALLETS</span>
    <span class="found-count" id="foundCounter">0</span>
  </div>

  <!-- RESULT PANEL (dynamic icon + balance) -->
  <div class="result-panel" id="resultPanel">
    <div class="result-icon" style="background:#2e4a5a; font-size:20px;">⚡</div>
    <div class="result-text placeholder-text">awaiting balance capture...</div>
  </div>

  <!-- Crypto grid 3x3 official icons + blue checkmarks -->
  <div class="crypto-grid">
    <!-- Bitcoin -->
    <div class="coin-card"><div class="coin-circle" style="background: #F7931A;">₿</div><div class="blue-check">✓</div></div>
    <!-- Ethereum -->
    <div class="coin-card"><div class="coin-circle" style="background: #627EEA;">Ξ</div><div class="blue-check">✓</div></div>
    <!-- Litecoin -->
    <div class="coin-card"><div class="coin-circle" style="background: #345D9D;">Ł</div><div class="blue-check">✓</div></div>
    <!-- BNB -->
    <div class="coin-card"><div class="coin-circle" style="background: #F3BA2F;">BNB</div><div class="blue-check">✓</div></div>
    <!-- Solana -->
    <div class="coin-card"><div class="coin-circle" style="background: #9945FF;">SOL</div><div class="blue-check">✓</div></div>
    <!-- Tether -->
    <div class="coin-card"><div class="coin-circle" style="background: #26A17B;">₮</div><div class="blue-check">✓</div></div>
    <!-- Bitcoin Cash -->
    <div class="coin-card"><div class="coin-circle" style="background: #8DC351;">BCH</div><div class="blue-check">✓</div></div>
    <!-- Dogecoin -->
    <div class="coin-card"><div class="coin-circle" style="background: #C2A633;">Ð</div><div class="blue-check">✓</div></div>
    <!-- TRON -->
    <div class="coin-card"><div class="coin-circle" style="background: #FF0010;">TRX</div><div class="blue-check">✓</div></div>
  </div>

  <!-- START / STOP buttons -->
  <div class="button-row">
    <button class="action-btn start" id="startBtn">▶ START</button>
    <button class="action-btn stop" id="stopBtn">■ STOP</button>
  </div>
</div>

<script>
  // -------------------------------
  //  HACKER-STYLE WALLET BRUTEFORCE
  // -------------------------------
  
  // Predefined terminal lines pool
  const walletChecks = [
    "Wallet Check: fluid busy gate deny",
    "Wallet Check: pumpkin fossil radar",
    "Wallet Check: puppy analyst category",
    "Wallet Check: animal couch universe",
    "Wallet Check: radar cream limit soul",
    "Wallet Check: anxiety economy rescue",
    "Wallet Check: retreat labor antenna"
  ];

  // Mapping for result panel icons & coin data (9 major coins)
  const coinIconMap = {
    'BTC': { bg: '#F7931A', symbol: '₿', name: 'Bitcoin' },
    'ETH': { bg: '#627EEA', symbol: 'Ξ', name: 'Ethereum' },
    'LTC': { bg: '#345D9D', symbol: 'Ł', name: 'Litecoin' },
    'BNB': { bg: '#F3BA2F', symbol: 'BNB', name: 'BNB' },
    'SOL': { bg: '#9945FF', symbol: 'SOL', name: 'Solana' },
    'USDT': { bg: '#26A17B', symbol: '₮', name: 'Tether' },
    'BCH': { bg: '#8DC351', symbol: 'BCH', name: 'Bitcoin Cash' },
    'DOGE': { bg: '#C2A633', symbol: 'Ð', name: 'Dogecoin' },
    'TRX': { bg: '#FF0010', symbol: 'TRX', name: 'TRON' }
  };

  // DOM elements
  const terminalDiv = document.getElementById('terminalConsole');
  const checkedSpan = document.getElementById('checkedCounter');
  const foundSpan = document.getElementById('foundCounter');
  const resultPanelDiv = document.getElementById('resultPanel');

  // State
  let checkedWallets = 0;
  let foundWallets = 0;
  let isScanning = false;
  let currentTimeout = null;

  // Helper: add line to terminal + auto-scroll
  function addTerminalLine(text) {
    const line = document.createElement('div');
    line.className = 'terminal-line';
    line.innerText = `> ${text}`;
    terminalDiv.appendChild(line);
    terminalDiv.scrollTop = terminalDiv.scrollHeight;
    // keep last 180 lines for performance
    if (terminalDiv.children.length > 180) {
      terminalDiv.removeChild(terminalDiv.children[0]);
    }
  }

  // Update Checked UI
  function updateCheckedUI() {
    checkedSpan.innerText = checkedWallets;
  }

  // Update Found UI
  function updateFoundUI() {
    foundSpan.innerText = foundWallets;
  }

  // Generate random realistic balance for a specific coinKey
  function generateFoundData(coinKey) {
    const coin = coinIconMap[coinKey];
    if (!coin) return { display: "0.00 USDT = 0.00$", coinKey: 'USDT' };
    
    let amount, usdValue, displayText;
    const randomPriceSeed = () => Math.random() * 0.8 + 0.6; // variety

    switch(coinKey) {
      case 'BTC':
        amount = (Math.random() * 2.2 + 0.002).toFixed(5);
        const btcPrice = Math.floor(Math.random() * (72000 - 38000 + 1) + 38000);
        usdValue = (parseFloat(amount) * btcPrice).toFixed(2);
        displayText = `${amount} BTC = ${usdValue}$`;
        break;
      case 'ETH':
        amount = (Math.random() * 12 + 0.08).toFixed(4);
        const ethPrice = Math.floor(Math.random() * (4100 - 1700 + 1) + 1700);
        usdValue = (parseFloat(amount) * ethPrice).toFixed(2);
        displayText = `${amount} ETH = ${usdValue}$`;
        break;
      case 'LTC':
        amount = (Math.random() * 48 + 0.5).toFixed(2);
        const ltcPrice = Math.floor(Math.random() * (130 - 60 + 1) + 60);
        usdValue = (parseFloat(amount) * ltcPrice).toFixed(2);
        displayText = `${amount} LTC = ${usdValue}$`;
        break;
      case 'BNB':
        amount = (Math.random() * 28 + 0.3).toFixed(3);
        const bnbPrice = Math.floor(Math.random() * (680 - 280 + 1) + 280);
        usdValue = (parseFloat(amount) * bnbPrice).toFixed(2);
        displayText = `${amount} BNB = ${usdValue}$`;
        break;
      case 'SOL':
        amount = (Math.random() * 210 + 0.8).toFixed(2);
        const solPrice = Math.floor(Math.random() * (210 - 80 + 1) + 80);
        usdValue = (parseFloat(amount) * solPrice).toFixed(2);
        displayText = `${amount} SOL = ${usdValue}$`;
        break;
      case 'USDT':
        amount = (Math.random() * 4850 + 12).toFixed(2);
        usdValue = parseFloat(amount).toFixed(2);
        displayText = `${amount} USDT.TRC20 = ${usdValue}$`;
        break;
      case 'BCH':
        amount = (Math.random() * 12 + 0.2).toFixed(4);
        const bchPrice = Math.floor(Math.random() * (520 - 180 + 1) + 180);
        usdValue = (parseFloat(amount) * bchPrice).toFixed(2);
        displayText = `${amount} BCH = ${usdValue}$`;
        break;
      case 'DOGE':
        amount = (Math.random() * 18500 + 120).toFixed(0);
        const dogePrice = 0.12 + Math.random() * 0.08;
        usdValue = (parseFloat(amount) * dogePrice).toFixed(2);
        displayText = `${parseInt(amount)} DOGE = ${usdValue}$`;
        break;
      case 'TRX':
        amount = (Math.random() * 8900 + 300).toFixed(0);
        const trxPrice = 0.085 + Math.random() * 0.06;
        usdValue = (parseFloat(amount) * trxPrice).toFixed(2);
        displayText = `${parseInt(amount)} TRX = ${usdValue}$`;
        break;
      default:
        amount = (Math.random() * 1000 + 10).toFixed(2);
        displayText = `${amount} USDT.TRC20 = ${amount}$`;
        coinKey = 'USDT';
    }
    return { display: displayText, coinKey: coinKey };
  }

  // Update result panel with proper icon (left side) and text
  function updateResultPanel(coinKey, displayText) {
    const coin = coinIconMap[coinKey];
    if (!coin) return;
    // clear panel and rebuild with icon + text
    resultPanelDiv.innerHTML = '';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'result-icon';
    iconDiv.style.background = coin.bg;
    iconDiv.style.display = 'flex';
    iconDiv.style.alignItems = 'center';
    iconDiv.style.justifyContent = 'center';
    iconDiv.innerText = coin.symbol;
    const textSpan = document.createElement('div');
    textSpan.className = 'result-text';
    textSpan.innerText = displayText;
    resultPanelDiv.appendChild(iconDiv);
    resultPanelDiv.appendChild(textSpan);
  }

  // Reset result panel to default idle state (without icon glitch)
  function setDefaultResultPanel() {
    resultPanelDiv.innerHTML = `
      <div class="result-icon" style="background:#2e4a5a; font-size:20px;">⚡</div>
      <div class="result-text placeholder-text">awaiting balance capture...</div>
    `;
  }

  // Trigger found wallet: increments found counter, generates random coin and updates result panel
  function triggerFound() {
    foundWallets++;
    updateFoundUI();
    // pick random coin from supported list (9 coins)
    const coinList = ['BTC', 'ETH', 'LTC', 'BNB', 'SOL', 'USDT', 'BCH', 'DOGE', 'TRX'];
    const randomCoin = coinList[Math.floor(Math.random() * coinList.length)];
    const { display, coinKey } = generateFoundData(randomCoin);
    // update result panel with icon on left
    updateResultPanel(coinKey, display);
  }

  // Main scanning tick
  function performScanTick() {
    if (!isScanning) return;

    // 1. Increment checked wallets
    checkedWallets++;
    updateCheckedUI();

    // 2. Add random terminal line from predefined pool
    const randomLine = walletChecks[Math.floor(Math.random() * walletChecks.length)];
    addTerminalLine(randomLine);

    // 3. Random probability to find a wallet (~18% realistic bruteforce)
    const foundProbability = Math.random();
    if (foundProbability < 0.18) {
      triggerFound();
    }

    // 4. Schedule next tick with random delay 200-400ms
    const nextDelay = Math.floor(Math.random() * (400 - 200 + 1) + 200);
    currentTimeout = setTimeout(() => {
      performScanTick();
    }, nextDelay);
  }

  // Stop scanning and clean timeout
  function stopScanning() {
    if (currentTimeout) {
      clearTimeout(currentTimeout);
      currentTimeout = null;
    }
    if (isScanning) {
      isScanning = false;
      addTerminalLine(">> [HALT] Scan stopped by user");
      const statusDiv = document.querySelector('.stats-row .stat:last-child .stat-value');
      if (statusDiv) statusDiv.innerText = '● STOPPED';
      statusDiv.style.color = "#ff9f6e";
      setTimeout(() => {
        if(!isScanning && statusDiv) statusDiv.innerText = '● IDLE';
      }, 1000);
    }
  }

  // Start scanning (reset flag, clear previous if any, fresh begin)
  function startScanning() {
    if (isScanning) {
      // already scanning, ignore to avoid double intervals
      return;
    }
    // kill any pending timeout before starting
    if (currentTimeout) {
      clearTimeout(currentTimeout);
      currentTimeout = null;
    }
    isScanning = true;
    addTerminalLine(">> SCAN ENGINE ACTIVATED | brute force mode");
    addTerminalLine(">> monitoring wallet entropy...");
    const statusDiv = document.querySelector('.stats-row .stat:last-child .stat-value');
    if (statusDiv) {
      statusDiv.innerText = '● SCANNING';
      statusDiv.style.color = "#2effb0";
    }
    // start recursive tick
    performScanTick();
  }

  // Event listeners
  document.getElementById('startBtn').addEventListener('click', () => {
    startScanning();
  });

  document.getElementById('stopBtn').addEventListener('click', () => {
    if (isScanning) {
      stopScanning();
    } else {
      addTerminalLine(">> no active scan — press START to begin");
    }
  });

  // Initialize default UI state
  setDefaultResultPanel();
  // ensure initial counters 0
  updateCheckedUI();
  updateFoundUI();
</script>
</body>
</html>
