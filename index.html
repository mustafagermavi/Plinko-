<!DOCTYPE html>
<html lang="kmr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Luxury Plinko - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #ffd700;
            font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(255,215,0,0.5);
            pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 20px;
        }
        .btn {
            background: linear-gradient(45deg, #ffd700, #aa8800);
            border: none; padding: 15px 40px; border-radius: 30px;
            color: black; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.3);
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px #ffd700; }
    </style>
</head>
<body>

    <div id="ui">BALANCE: $<span id="balance">1000</span></div>
    
    <div id="controls">
        <button class="btn" onclick="dropBall()">DROP 3D BALL</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        // 1. Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x05050a);
        document.body.appendChild(renderer.domElement);

        // 2. Physics World
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);

        // 3. Lighting (Luxury Glow)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffd700, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 4. Create Pegs (3D Cylinders)
        const pegs = [];
        const pegMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.2 });
        for (let i = 0; i < 10; i++) {
            for (let j = 0; j <= i; j++) {
                const x = (j - i / 2) * 1.5;
                const y = 10 - i * 1.5;
                
                const pegMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.5, 16), pegMaterial);
                pegMesh.position.set(x, y, 0);
                pegMesh.rotation.x = Math.PI / 2;
                scene.add(pegMesh);

                const pegShape = new CANNON.Cylinder(0.1, 0.1, 0.5, 16);
                const pegBody = new CANNON.Body({ mass: 0 });
                pegBody.addShape(pegShape);
                pegBody.position.set(x, y, 0);
                pegBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), Math.PI / 2);
                world.addBody(pegBody);
            }
        }

        // 5. Drop Ball Logic
        let balance = 1000;
        const balls = [];

        function dropBall() {
            if(balance < 10) return;
            balance -= 10;
            document.getElementById('balance').innerText = balance;

            const ballRadius = 0.2;
            const ballMesh = new THREE.Mesh(
                new THREE.SphereGeometry(ballRadius, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.5 })
            );
            scene.add(ballMesh);

            const ballShape = new CANNON.Sphere(ballRadius);
            const ballBody = new CANNON.Body({ mass: 1, restitution: 0.7 });
            ballBody.addShape(ballShape);
            ballBody.position.set((Math.random() - 0.5) * 0.2, 12, 0);
            world.addBody(ballBody);

            balls.push({ mesh: ballMesh, body: ballBody });
        }

        camera.position.z = 15;
        camera.position.y = 5;

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);

            balls.forEach(b => {
                b.mesh.position.copy(b.body.position);
                b.mesh.quaternion.copy(b.body.quaternion);
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
