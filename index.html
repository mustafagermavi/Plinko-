<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Parallax Crash</title>
    <style>
        :root {
            --bg: #050505;
            --rocket-main: #ffffff;
            --rocket-shade: #e5e7eb;
            --accent: #38bdf8;
        }

        body {
            margin: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 1. Game Screen & Parallax Layers */
        #game-screen {
            width: 380px; height: 550px;
            background: var(--bg);
            position: relative; overflow: hidden;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Layer 1: Far Stars */
        .parallax-bg-1 {
            position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.2;
        }

        /* Layer 2: Near Stars/Dots */
        .parallax-bg-2 {
            position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background-image: radial-gradient(white 1.5px, transparent 1.5px);
            background-size: 30px 30px; opacity: 0.4;
        }

        /* Layer 3: Isometric Grid (Fastest) */
        .parallax-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 200%;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(-45deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 2. Isometric Minimalist Rocket */
        #rocket-container {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%) rotateX(60deg) rotateZ(45deg);
            transform-style: preserve-3d;
            z-index: 10;
        }

        .rocket-3d {
            width: 30px; height: 60px;
            position: relative; transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 30px; height: 60px;
            border: 1.5px solid #000;
        }

        .front { background: var(--rocket-main); transform: translateZ(15px); }
        .side { background: var(--rocket-shade); transform: rotateY(-90deg) translateZ(15px); }
        
        /* Minimal Nose */
        .nose {
            position: absolute; top: -15px; width: 30px; height: 15px;
            background: #000; clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }

        /* 3. UI Elements */
        #multiplier {
            position: absolute; top: 60px; width: 100%; text-align: center;
            font-size: 4.5rem; font-weight: 200; color: #fff;
            letter-spacing: -2px; z-index: 20;
        }

        .controls {
            width: 380px; padding: 30px 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn {
            width: 75%; padding: 18px; font-size: 1rem; font-weight: 700;
            color: #000; background: #fff; border: none;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.2s;
        }

        .btn.cashout { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div class="parallax-bg-1" id="bg1"></div>
        <div class="parallax-bg-2" id="bg2"></div>
        <div class="parallax-grid" id="bgGrid"></div>
        
        <div id="multiplier">1.00</div>

        <div id="rocket-container">
            <div class="rocket-3d">
                <div class="face front"><div class="nose"></div></div>
                <div class="face side"><div class="nose"></div></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="actionBtn" class="btn" onclick="handleAction()">Start Bet</button>
    </div>

    <script>
        let multiplier = 1.00;
        let isRunning = false;
        let gameLoop;
        let crashPoint;

        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        const bgGrid = document.getElementById('bgGrid');
        const rocket = document.getElementById('rocket-container');
        const multEl = document.getElementById('multiplier');
        const actionBtn = document.getElementById('actionBtn');

        let bgPos1 = 0, bgPos2 = 0, bgGridPos = 0;

        function handleAction() {
            if (!isRunning) startGame();
            else cashOut();
        }

        function startGame() {
            isRunning = true; multiplier = 1.00;
            crashPoint = (Math.random() * 5 + 1.2).toFixed(2);
            actionBtn.innerText = "Cash Out";
            actionBtn.classList.add('cashout');

            gameLoop = setInterval(() => {
                multiplier += 0.03;
                multEl.innerText = multiplier.toFixed(2);

                // Parallax Effect Logic
                bgPos1 -= 0.5; // Slow
                bgPos2 -= 1.5; // Medium
                bgGridPos -= 4; // Fast

                bg1.style.transform = `translateY(${bgPos1 % 50}px)`;
                bg2.style.transform = `translateY(${bgPos2 % 30}px)`;
                bgGrid.style.transform = `translateY(${bgGridPos % 40}px)`;

                // Rocket Climb
                let yPos = Math.min((multiplier - 1) * 60, 300);
                rocket.style.bottom = (80 + yPos) + 'px';

                if (multiplier >= crashPoint) endGame(true);
            }, 50);
        }

        function cashOut() {
            endGame(false);
            rocket.style.transition = "all 1s ease-in";
            rocket.style.bottom = "1000px";
        }

        function endGame(isCrash) {
            clearInterval(gameLoop);
            isRunning = false;
            actionBtn.innerText = "Try Again";
            actionBtn.classList.remove('cashout');
            if (isCrash) {
                multEl.style.color = "#ef4444";
                rocket.style.bottom = "80px";
            }
        }
    </script>
</body>
</html>
